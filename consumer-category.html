<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>臻伟福利 - 商品分类</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      background: #e5e5e5;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
    }
    
    /* 手机框架 - 模拟iPhone */
    .phone-frame {
      width: 390px;
      height: 100vh;
      margin: 0 auto;
      background: #f5f5f5;
      box-shadow: 0 0 30px rgba(0,0,0,0.2);
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    /* 顶部搜索区 */
    .search-header {
      background: linear-gradient(135deg, #1890FF, #40a9ff);
      padding: 0 16px 12px;
      flex-shrink: 0;
    }
    .status-bar {
      height: 44px;
    }
    .search-bar {
      display: flex;
      align-items: center;
      background: white;
      border-radius: 20px;
      padding: 10px 16px;
      gap: 8px;
    }
    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 14px;
      color: #333;
    }
    .search-bar input::placeholder {
      color: #bbb;
    }
    
    /* 分类主体区域 */
    .category-container {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    
    /* 左侧一级分类 */
    .category-left {
      width: 90px;
      background: #f5f5f5;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .category-item {
      padding: 16px 12px;
      text-align: center;
      font-size: 13px;
      color: #666;
      cursor: pointer;
      position: relative;
      transition: all 0.2s;
    }
    .category-item:hover {
      background: #eee;
    }
    .category-item.active {
      background: white;
      color: #1890FF;
      font-weight: 600;
    }
    .category-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 20px;
      background: #1890FF;
      border-radius: 0 2px 2px 0;
    }
    .category-icon {
      font-size: 22px;
      margin-bottom: 6px;
      display: block;
    }
    
    /* 右侧二级分类 */
    .category-right {
      flex: 1;
      background: white;
      overflow-y: auto;
      padding: 16px;
    }
    .subcategory-header {
      font-size: 15px;
      font-weight: 600;
      color: #333;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f0f0f0;
    }
    .subcategory-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px 12px;
    }
    .subcategory-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .subcategory-item:active {
      transform: scale(0.95);
    }
    .subcategory-icon {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
      font-size: 26px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .subcategory-name {
      font-size: 12px;
      color: #333;
      text-align: center;
      line-height: 1.4;
    }
    
    /* 推荐商品区 */
    .recommend-section {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid #f0f0f0;
    }
    .recommend-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .recommend-header .line {
      width: 3px;
      height: 16px;
      background: #1890FF;
      border-radius: 2px;
    }
    .recommend-header span {
      font-weight: 600;
      color: #333;
      font-size: 15px;
    }
    .recommend-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .recommend-item {
      background: #fafafa;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
    }
    .recommend-item:active {
      transform: scale(0.98);
    }
    .recommend-item .img {
      width: 100%;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }
    .recommend-item .info {
      padding: 8px 10px;
    }
    .recommend-item .name {
      font-size: 12px;
      color: #333;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .recommend-item .price {
      font-size: 14px;
      color: #FF4D4F;
      font-weight: 600;
      margin-top: 4px;
    }
    
    /* 底部导航 */
    .bottom-nav {
      width: 100%;
      height: 56px;
      background: white;
      border-top: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      flex-shrink: 0;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #999;
      cursor: pointer;
      padding: 6px 24px;
    }
    .nav-item.active {
      color: #1890FF;
    }
    .nav-item i {
      font-size: 20px;
      margin-bottom: 2px;
    }
    .nav-item span {
      font-size: 11px;
    }
    .nav-item .badge {
      position: absolute;
      top: 0;
      right: 10px;
      background: #FF4D4F;
      color: white;
      font-size: 10px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-item.has-badge {
      position: relative;
    }
  </style>
</head>

        this.classList.add('active');

        // 更新右侧内容
        const category = this.dataset.category;
        const data = categoryData[category];
        
        // 更新标题
        document.querySelector('.subcategory-header').textContent = data.name;

        // 更新二级分类网格
        const grid = document.getElementById('subcategoryGrid');
        grid.innerHTML = data.subcategories.map(sub => `
          <div class="subcategory-item">
            <div class="subcategory-icon" style="background: linear-gradient(135deg, ${sub.bg[0]}, ${sub.bg[1]})">
              <i class="fas ${sub.icon}" style="color: ${sub.color}"></i>
            </div>
            <span class="subcategory-name">${sub.name}</span>
          </div>
        `).join('');

        // 更新推荐商品
        const recommendGrid = document.getElementById('recommendGrid');
        recommendGrid.innerHTML = data.recommends.map(rec => `
          <div class="recommend-item">
            <div class="img" style="background: linear-gradient(135deg, ${rec.bg[0]}, ${rec.bg[1]})">
              <i class="fas ${rec.icon}" style="color: ${rec.color}"></i>
            </div>
            <div class="info">
              <div class="name">${rec.name}</div>
              <div class="price">${rec.price}</div>
            </div>
          </div>
        `).join('');
      });
    });
