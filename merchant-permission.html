<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>臻伟福利 - 权限管理（PC端）</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { 
      height: 100%;
      background: #f0f2f5; 
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; }
    
    /* 整体布局 */
    .app-container {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    
    /* 侧边导航 */
    .sidebar {
      width: 220px;
      background: #001529;
      color: white;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .sidebar-logo i {
      font-size: 24px;
      color: #52C41A;
    }
    
    .sidebar-logo span {
      font-size: 18px;
      font-weight: 600;
    }
    
    .sidebar-menu {
      flex: 1;
      padding: 12px 0;
      overflow-y: auto;
    }
    
    .menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      color: rgba(255,255,255,0.65);
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
    }
    
    .menu-item:hover {
      background: rgba(255,255,255,0.08);
      color: white;
    }
    
    .menu-item.active {
      background: #52C41A;
      color: white;
    }
    
    .menu-item i {
      font-size: 16px;
      width: 20px;
      text-align: center;
    }
    
    .menu-item span {
      font-size: 14px;
    }
    
    /* 主内容区 */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    /* 顶部栏 */
    .topbar {
      height: 60px;
      background: white;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }
    
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .topbar-title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
    }
    
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    
    .notification-btn {
      position: relative;
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      transition: background 0.3s;
    }
    
    .notification-btn:hover {
      background: #f5f5f5;
    }
    
    .notification-btn i {
      font-size: 18px;
      color: #666;
    }
    
    .notification-badge {
      position: absolute;
      top: 2px;
      right: 2px;
      background: #FF4D4F;
      color: white;
      font-size: 10px;
      min-width: 16px;
      height: 16px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }
    
    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 8px;
      transition: background 0.3s;
    }
    
    .user-info:hover {
      background: #f5f5f5;
    }
    
    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #52C41A, #22c55e);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
    }
    
    .user-name {
      font-size: 14px;
      color: #333;
    }
    
    /* 内容区 */
    .content-area {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      gap: 24px;
    }
    
    /* 左侧角色列表 */
    .role-panel {
      width: 280px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    
    .panel-header {
      padding: 16px 20px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .panel-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .panel-title i {
      color: #1890FF;
    }
    
    .panel-actions {
      display: flex;
      gap: 8px;
    }
    
    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: none;
      background: #f5f5f5;
      color: #666;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }
    
    .icon-btn:hover {
      background: #1890FF;
      color: white;
    }
    
    .role-list {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
    }
    
    .role-item {
      padding: 14px 16px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #333;
      transition: all 0.3s;
      margin-bottom: 4px;
    }
    
    .role-item:hover {
      background: #e6f7ff;
    }
    
    .role-item.active {
      background: #e6f7ff;
      border: 1px solid #1890FF;
    }
    
    .role-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .role-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .role-icon i {
      font-size: 16px;
    }
    
    .role-icon.admin {
      background: rgba(250, 173, 20, 0.1);
    }
    .role-icon.admin i {
      color: #FAAD14;
    }
    
    .role-icon.manager {
      background: rgba(24, 144, 255, 0.1);
    }
    .role-icon.manager i {
      color: #1890FF;
    }
    
    .role-icon.staff {
      background: rgba(82, 196, 26, 0.1);
    }
    .role-icon.staff i {
      color: #52C41A;
    }
    
    .role-icon.custom {
      background: rgba(114, 46, 209, 0.1);
    }
    .role-icon.custom i {
      color: #722ED1;
    }
    
    .role-name {
      font-size: 14px;
      font-weight: 500;
    }
    
    .role-count {
      font-size: 12px;
      color: #999;
    }
    
    .role-badge {
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
    }
    
    .role-badge.system {
      background: #f5f5f5;
      color: #999;
    }
    
    .role-badge.custom {
      background: #f9f0ff;
      color: #722ED1;
    }
    
    /* 右侧权限配置 */
    .permission-panel {
      flex: 1;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
    }
    
    .permission-header {
      padding: 20px 24px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .permission-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }
    
    .permission-desc {
      font-size: 13px;
      color: #999;
      margin-top: 4px;
    }
    
    .header-actions {
      display: flex;
      gap: 12px;
    }
    
    .btn {
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.3s;
    }
    
    .btn-primary {
      background: #1890FF;
      color: white;
      border: none;
    }
    
    .btn-primary:hover {
      background: #40a9ff;
    }
    
    .btn-default {
      background: white;
      color: #666;
      border: 1px solid #d9d9d9;
    }
    
    .btn-default:hover {
      border-color: #1890FF;
      color: #1890FF;
    }
    
    .btn-danger {
      background: white;
      color: #FF4D4F;
      border: 1px solid #FF4D4F;
    }
    
    .btn-danger:hover {
      background: #FF4D4F;
      color: white;
    }
    
    /* 权限列表 */
    .permission-content {
      flex: 1;
      padding: 20px 24px;
      overflow-y: auto;
    }
    
    .permission-group {
      margin-bottom: 24px;
    }
    
    .group-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #fafafa;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    
    .group-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }
    
    .group-title i {
      color: #1890FF;
    }
    
    .group-select-all {
      font-size: 13px;
      color: #1890FF;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .group-select-all:hover {
      color: #40a9ff;
    }
    
    .permission-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    
    .permission-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border: 1px solid #f0f0f0;
      border-radius: 8px;
      transition: all 0.3s;
    }
    
    .permission-item:hover {
      border-color: #1890FF;
      background: #fafafa;
    }
    
    .permission-item.checked {
      border-color: #52C41A;
      background: #f6ffed;
    }
    
    .permission-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .permission-checkbox {
      width: 18px;
      height: 18px;
      border: 2px solid #d9d9d9;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .permission-checkbox.checked {
      background: #52C41A;
      border-color: #52C41A;
    }
    
    .permission-checkbox.checked i {
      color: white;
      font-size: 12px;
    }
    
    .permission-text {
      font-size: 14px;
      color: #333;
    }
    
    .permission-tag {
      font-size: 12px;
      color: #999;
      background: #f5f5f5;
      padding: 2px 8px;
      border-radius: 4px;
    }
    
    /* 底部操作栏 */
    .permission-footer {
      padding: 16px 24px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .footer-info {
      font-size: 13px;
      color: #999;
    }
    
    .footer-actions {
      display: flex;
      gap: 12px;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- 侧边导航 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <i class="fas fa-store"></i>
          <span>商家工作台</span>
        </div>
      </div>
      <nav class="sidebar-menu">
        <a href="merchant-home.html" class="menu-item">
          <i class="fas fa-home"></i>
          <span>工作台</span>
        </a>
        <a href="merchant-exchange.html" class="menu-item">
          <i class="fas fa-exchange-alt"></i>
          <span>订单兑换</span>
        </a>
        <a href="merchant-exchange-manage.html" class="menu-item">
          <i class="fas fa-gift"></i>
          <span>兑换管理</span>
        </a>
        <a href="merchant-stats.html" class="menu-item">
          <i class="fas fa-chart-bar"></i>
          <span>数据统计</span>
        </a>
        <a href="merchant-organization.html" class="menu-item">
          <i class="fas fa-sitemap"></i>
          <span>组织架构</span>
        </a>
        <a href="merchant-permission.html" class="menu-item active">
          <i class="fas fa-shield-alt"></i>
          <span>权限管理</span>
        </a>
        <a href="merchant-mini-profile.html" class="menu-item">
          <i class="fas fa-user-circle"></i>
          <span>账户设置</span>
        </a>
      </nav>
    </aside>
    
    <!-- 主内容区 -->
    <main class="main-content">
      <!-- 顶部栏 -->
      <header class="topbar">
        <div class="topbar-left">
          <h1 class="topbar-title">权限管理</h1>
        </div>
        <div class="topbar-right">
          <div class="notification-btn">
            <i class="fas fa-bell"></i>
            <span class="notification-badge">3</span>
          </div>
          <div class="user-info">
            <div class="user-avatar">
              <i class="fas fa-user"></i>
            </div>
            <span class="user-name">张三店铺</span>
          </div>
        </div>
      </header>
      
      <!-- 内容区 -->
      <div class="content-area">
        <!-- 左侧角色列表 -->
        <div class="role-panel">
          <div class="panel-header">
            <div class="panel-title">
              <i class="fas fa-users-cog"></i>
              角色列表
            </div>
            <div class="panel-actions">
              <button class="icon-btn" title="新增角色">
                <i class="fas fa-plus"></i>
              </button>
            </div>
          </div>
          <div class="role-list">
            <div class="role-item active">
              <div class="role-info">
                <div class="role-icon admin">
                  <i class="fas fa-user-shield"></i>
                </div>
                <div>
                  <div class="role-name">管理员</div>
                  <div class="role-count">2人</div>
                </div>
              </div>
              <span class="role-badge system">系统</span>
            </div>
            
            <div class="role-item">
              <div class="role-info">
                <div class="role-icon manager">
                  <i class="fas fa-user-tie"></i>
                </div>
                <div>
                  <div class="role-name">主管</div>
                  <div class="role-count">3人</div>
                </div>
              </div>
              <span class="role-badge system">系统</span>
            </div>
            
            <div class="role-item">
              <div class="role-info">
                <div class="role-icon staff">
                  <i class="fas fa-user"></i>
                </div>
                <div>
                  <div class="role-name">员工</div>
                  <div class="role-count">15人</div>
                </div>
              </div>
              <span class="role-badge system">系统</span>
            </div>
            
            <div class="role-item">
              <div class="role-info">
                <div class="role-icon custom">
                  <i class="fas fa-user-cog"></i>
                </div>
                <div>
                  <div class="role-name">客服专员</div>
                  <div class="role-count">4人</div>
                </div>
              </div>
              <span class="role-badge custom">自定义</span>
            </div>
          </div>
        </div>
        
        <!-- 右侧权限配置 -->
        <div class="permission-panel">
          <div class="permission-header">
            <div>
              <div class="permission-title">管理员权限配置</div>
              <div class="permission-desc">拥有所有功能的操作权限</div>
            </div>
            <div class="header-actions">
              <button class="btn btn-danger">
                <i class="fas fa-trash-alt"></i>
                删除角色
              </button>
            </div>
          </div>
          
          <div class="permission-content">
            <!-- 工作台权限 -->
            <div class="permission-group">
              <div class="group-header">
                <div class="group-title">
                  <i class="fas fa-home"></i>
                  工作台
                </div>
                <div class="group-select-all">
                  <i class="fas fa-check"></i>
                  全选
                </div>
              </div>
              <div class="permission-list">
                <div class="permission-item checked">
                  <div class="permission-info">
                    <div class="permission-checkbox checked">
                      <i class="fas fa-check"></i>
                    </div>
                    <span class="permission-text">查看工作台</span>
                  </div>
                </div>
                <div class="permission-item checked">
                  <div class="permission-info">
                    <div class="permission-checkbox checked">
                      <i class="fas fa-check"></i>
                    </div>
                    <span class="permission-text">数据统计查看</span>
                  </div>
                </div>
              </div>
            </div>
            
            <!-- 订单权限 -->
            <div class="permission-group">
              <div class="group-header">
                <div class="group-title">
                  <i class="fas fa-shopping-cart"></i>
                  订单管理
                </div>
                <div class="group-select-all">
                  <i class="fas fa-check"></i>
                  全选
                </div>
              </div>
              <div class="permission-list">
                <div class="permission-item checked">
                  <div class="permission-info">
                    <div class="permission-checkbox checked">
                      <i class="fas fa-check"></i>
                    </div>
                    <span class="permission-text">查看订单</span>
                  </div>
                </div>
                <div class="permission-item checked">
                  <div class="permission-info">
                    <div class="permission-checkbox checked">
                      <i class="fas fa-check"></i>
                    </div>
                    <span class="permission-text">订单发货</span>
                  </div>
                </div>
                <div class="permission-item checked">
                  <div class="permission-info">
                    <div class="permission-checkbox checked">
                      <i class="fas fa-check"></i>
                    </div>
                    <span class="permission-text">订单兑换</span>
                  </div>
                </div>
                <div class="permission-item checked">
                  <div class="permission-info">
                    <div class="permission-checkbox checked">
                      <i class="fas fa-check"></i>
                    </div>
                    <span class="permission-text">兑换管理</span>
                  </div>
                </div>
              </div>
            </div>
            
            <!-- 商品权限 -->
            <div class="permission-group">
              <div class="group-header">
                <div class="group-title">
                  <i class="fas fa-box"></i>
                  商品管理
                </div>
                <div class="group-select-all">
                  <i class="fas fa-check"></i>
                  全选
                </div>
              </div>
              <div class="permission-list">
                <div class="permission-item checked">
                  <div class="permission-info">
                    <div class="permission-checkbox checked">
                      <i class="fas fa-check"></i>
                    </div>
                    <span class="permission-text">查看商品</span>
                  </div>
                </div>
                <div class="permission-item checked">
                  <div class="permission-info">
                    <div class="permission-checkbox checked">
                      <i class="fas fa-check"></i>
                    </div>
                    <span class="permission-text">新增商品</span>
                  </div>
                </div>
                <div class="permission-item checked">
                  <div class="permission-info">
                    <div class="permission-checkbox checked">
                      <i class="fas fa-check"></i>
                    </div>
                    <span class="permission-text">编辑商品</span>
                  </div>
                </div>
                <div class="permission-item checked">
                  <div class="permission-info">
                    <div class="permission-checkbox checked">
                      <i class="fas fa-check"></i>
                    </div>
                    <span class="permission-text">删除商品</span>
                  </div>
                </div>
              </div>
            </div>
            
            <!-- 组织权限 -->
            <div class="permission-group">
              <div class="group-header">
                <div class="group-title">
                  <i class="fas fa-sitemap"></i>
                  组织管理
                </div>
                <div class="group-select-all">
                  <i class="fas fa-check"></i>
                  全选
                </div>
              </div>
              <div class="permission-list">
                <div class="permission-item checked">
                  <div class="permission-info">
                    <div class="permission-checkbox checked">
                      <i class="fas fa-check"></i>
                    </div>
                    <span class="permission-text">查看组织架构</span>
                  </div>
                </div>
                <div class="permission-item checked">
                  <div class="permission-info">
                    <div class="permission-checkbox checked">
                      <i class="fas fa-check"></i>
                    </div>
                    <span class="permission-text">成员管理</span>
                  </div>
                </div>
                <div class="permission-item checked">
                  <div class="permission-info">
                    <div class="permission-checkbox checked">
                      <i class="fas fa-check"></i>
                    </div>
                    <span class="permission-text">权限配置</span>
                  </div>
                </div>
                <div class="permission-item checked">
                  <div class="permission-info">
                    <div class="permission-checkbox checked">
                      <i class="fas fa-check"></i>
                    </div>
                    <span class="permission-text">角色管理</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
          
          <div class="permission-footer">
            <div class="footer-info">
              已选择 14 项权限
            </div>
            <div class="footer-actions">
              <button class="btn btn-default">
                <i class="fas fa-undo"></i>
                重置
              </button>
              <button class="btn btn-primary">
                <i class="fas fa-save"></i>
                保存配置
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
