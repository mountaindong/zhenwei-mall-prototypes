<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>臻伟福利 - 组织架构（PC端）</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { 
      height: 100%;
      background: #f0f2f5; 
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; }
    
    /* 整体布局 */
    .app-container {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    
    /* 侧边导航 */
    .sidebar {
      width: 220px;
      background: #001529;
      color: white;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .sidebar-logo i {
      font-size: 24px;
      color: #52C41A;
    }
    
    .sidebar-logo span {
      font-size: 18px;
      font-weight: 600;
    }
    
    .sidebar-menu {
      flex: 1;
      padding: 12px 0;
      overflow-y: auto;
    }
    
    .menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      color: rgba(255,255,255,0.65);
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
    }
    
    .menu-item:hover {
      background: rgba(255,255,255,0.08);
      color: white;
    }
    
    .menu-item.active {
      background: #52C41A;
      color: white;
    }
    
    .menu-item i {
      font-size: 16px;
      width: 20px;
      text-align: center;
    }
    
    .menu-item span {
      font-size: 14px;
    }
    
    /* 主内容区 */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    /* 顶部栏 */
    .topbar {
      height: 60px;
      background: white;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }
    
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .topbar-title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
    }
    
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    
    .notification-btn {
      position: relative;
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      transition: background 0.3s;
    }
    
    .notification-btn:hover {
      background: #f5f5f5;
    }
    
    .notification-btn i {
      font-size: 18px;
      color: #666;
    }
    
    .notification-badge {
      position: absolute;
      top: 2px;
      right: 2px;
      background: #FF4D4F;
      color: white;
      font-size: 10px;
      min-width: 16px;
      height: 16px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }
    
    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 8px;
      transition: background 0.3s;
    }
    
    .user-info:hover {
      background: #f5f5f5;
    }
    
    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #52C41A, #22c55e);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
    }
    
    .user-name {
      font-size: 14px;
      color: #333;
    }
    
    /* 内容区 */
    .content-area {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      gap: 24px;
    }
    
    /* 左侧部门树 */
    .dept-panel {
      width: 300px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    
    .panel-header {
      padding: 16px 20px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .panel-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .panel-title i {
      color: #1890FF;
    }
    
    .panel-actions {
      display: flex;
      gap: 8px;
    }
    
    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: none;
      background: #f5f5f5;
      color: #666;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }
    
    .icon-btn:hover {
      background: #1890FF;
      color: white;
    }
    
    .dept-tree {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
    }
    
    .tree-item {
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #333;
      transition: all 0.3s;
      margin-bottom: 4px;
    }
    
    .tree-item:hover {
      background: #e6f7ff;
    }
    
    .tree-item.active {
      background: #e6f7ff;
      color: #1890FF;
    }
    
    .tree-item i.folder {
      color: #faad14;
    }
    
    .tree-item i.folder-open {
      color: #1890FF;
    }
    
    .tree-children {
      margin-left: 24px;
    }
    
    .tree-item-count {
      margin-left: auto;
      font-size: 12px;
      color: #999;
      background: #f5f5f5;
      padding: 2px 8px;
      border-radius: 10px;
    }
    
    /* 右侧成员列表 */
    .member-panel {
      flex: 1;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
    }
    
    .panel-toolbar {
      padding: 16px 20px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    
    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .search-box {
      display: flex;
      align-items: center;
      background: #f5f5f5;
      border-radius: 6px;
      padding: 0 12px;
      width: 240px;
    }
    
    .search-box i {
      color: #999;
      font-size: 14px;
    }
    
    .search-input {
      border: none;
      background: transparent;
      padding: 10px 8px;
      font-size: 14px;
      width: 100%;
      outline: none;
    }
    
    .toolbar-right {
      display: flex;
      gap: 12px;
    }
    
    .btn {
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.3s;
    }
    
    .btn-primary {
      background: #1890FF;
      color: white;
      border: none;
    }
    
    .btn-primary:hover {
      background: #40a9ff;
    }
    
    .btn-default {
      background: white;
      color: #666;
      border: 1px solid #d9d9d9;
    }
    
    .btn-default:hover {
      border-color: #1890FF;
      color: #1890FF;
    }
    
    /* 成员表格 */
    .member-table {
      flex: 1;
      overflow: auto;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    
    th, td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid #f0f0f0;
    }
    
    th {
      font-size: 13px;
      color: #999;
      font-weight: 500;
      background: #fafafa;
      position: sticky;
      top: 0;
    }
    
    td {
      font-size: 14px;
      color: #333;
    }
    
    tr:hover td {
      background: #fafafa;
    }
    
    .member-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .member-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1890FF, #40a9ff);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 16px;
    }
    
    .member-name {
      font-weight: 500;
    }
    
    .member-phone {
      font-size: 12px;
      color: #999;
    }
    
    .role-tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
    }
    
    .role-tag.admin {
      background: #fff7e6;
      color: #fa8c16;
    }
    
    .role-tag.manager {
      background: #e6f7ff;
      color: #1890FF;
    }
    
    .role-tag.staff {
      background: #f6ffed;
      color: #52c41a;
    }
    
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    
    .status-dot.active {
      background: #52C41A;
    }
    
    .status-dot.inactive {
      background: #d9d9d9;
    }
    
    .action-btns {
      display: flex;
      gap: 8px;
    }
    
    .action-btn {
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      border: none;
      transition: all 0.3s;
    }
    
    .action-btn.edit {
      background: #e6f7ff;
      color: #1890FF;
    }
    
    .action-btn.edit:hover {
      background: #1890FF;
      color: white;
    }
    
    .action-btn.delete {
      background: #fff1f0;
      color: #FF4D4F;
    }
    
    .action-btn.delete:hover {
      background: #FF4D4F;
      color: white;
    }
    
    /* 分页 */
    .pagination {
      padding: 16px 20px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .pagination-info {
      font-size: 13px;
      color: #999;
    }
    
    .pagination-btns {
      display: flex;
      gap: 8px;
    }
    
    .page-btn {
      min-width: 32px;
      height: 32px;
      border-radius: 6px;
      border: 1px solid #d9d9d9;
      background: white;
      color: #666;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
      transition: all 0.3s;
    }
    
    .page-btn:hover {
      border-color: #1890FF;
      color: #1890FF;
    }
    
    .page-btn.active {
      background: #1890FF;
      border-color: #1890FF;
      color: white;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- 侧边导航 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <i class="fas fa-store"></i>
          <span>商家工作台</span>
        </div>
      </div>
      <nav class="sidebar-menu">
        <a href="merchant-home.html" class="menu-item">
          <i class="fas fa-home"></i>
          <span>工作台</span>
        </a>
        <a href="merchant-exchange.html" class="menu-item">
          <i class="fas fa-exchange-alt"></i>
          <span>订单兑换</span>
        </a>
        <a href="merchant-exchange-manage.html" class="menu-item">
          <i class="fas fa-gift"></i>
          <span>兑换管理</span>
        </a>
        <a href="merchant-stats.html" class="menu-item">
          <i class="fas fa-chart-bar"></i>
          <span>数据统计</span>
        </a>
        <a href="merchant-organization.html" class="menu-item active">
          <i class="fas fa-sitemap"></i>
          <span>组织架构</span>
        </a>
        <a href="merchant-permission.html" class="menu-item">
          <i class="fas fa-shield-alt"></i>
          <span>权限管理</span>
        </a>
        <a href="merchant-mini-profile.html" class="menu-item">
          <i class="fas fa-user-circle"></i>
          <span>账户设置</span>
        </a>
      </nav>
    </aside>
    
    <!-- 主内容区 -->
    <main class="main-content">
      <!-- 顶部栏 -->
      <header class="topbar">
        <div class="topbar-left">
          <h1 class="topbar-title">组织架构</h1>
        </div>
        <div class="topbar-right">
          <div class="notification-btn">
            <i class="fas fa-bell"></i>
            <span class="notification-badge">3</span>
          </div>
          <div class="user-info">
            <div class="user-avatar">
              <i class="fas fa-user"></i>
            </div>
            <span class="user-name">张三店铺</span>
          </div>
        </div>
      </header>
      
      <!-- 内容区 -->
      <div class="content-area">
        <!-- 左侧部门树 -->
        <div class="dept-panel">
          <div class="panel-header">
            <div class="panel-title">
              <i class="fas fa-sitemap"></i>
              部门列表
            </div>
            <div class="panel-actions">
              <button class="icon-btn" title="新增部门">
                <i class="fas fa-plus"></i>
              </button>
              <button class="icon-btn" title="刷新">
                <i class="fas fa-sync-alt"></i>
              </button>
            </div>
          </div>
          <div class="dept-tree">
            <!-- 总部 -->
            <div class="tree-item active">
              <i class="fas fa-folder-open folder-open"></i>
              <span>总部</span>
              <span class="tree-item-count">12人</span>
            </div>
            <div class="tree-children">
              <div class="tree-item">
                <i class="fas fa-folder folder"></i>
                <span>运营部</span>
                <span class="tree-item-count">5人</span>
              </div>
              <div class="tree-item">
                <i class="fas fa-folder folder"></i>
                <span>客服部</span>
                <span class="tree-item-count">4人</span>
              </div>
              <div class="tree-item">
                <i class="fas fa-folder folder"></i>
                <span>财务部</span>
                <span class="tree-item-count">3人</span>
              </div>
            </div>
            
            <!-- 分店 -->
            <div class="tree-item" style="margin-top: 12px;">
              <i class="fas fa-folder folder"></i>
              <span>分店</span>
              <span class="tree-item-count">8人</span>
            </div>
          </div>
        </div>
        
        <!-- 右侧成员列表 -->
        <div class="member-panel">
          <div class="panel-toolbar">
            <div class="toolbar-left">
              <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" class="search-input" placeholder="搜索成员姓名/手机号">
              </div>
            </div>
            <div class="toolbar-right">
              <button class="btn btn-default">
                <i class="fas fa-download"></i>
                导出
              </button>
              <button class="btn btn-primary">
                <i class="fas fa-plus"></i>
                添加成员
              </button>
            </div>
          </div>
          
          <div class="member-table">
            <table>
              <thead>
                <tr>
                  <th>成员信息</th>
                  <th>所属部门</th>
                  <th>角色</th>
                  <th>状态</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>
                    <div class="member-info">
                      <div class="member-avatar">张</div>
                      <div>
                        <div class="member-name">张三</div>
                        <div class="member-phone">138****1234</div>
                      </div>
                    </div>
                  </td>
                  <td>运营部</td>
                  <td><span class="role-tag admin">管理员</span></td>
                  <td><span class="status-dot active"></span>在职</td>
                  <td>
                    <div class="action-btns">
                      <button class="action-btn edit">编辑</button>
                      <button class="action-btn delete">删除</button>
                    </div>
                  </td>
                </tr>
                <tr>
                  <td>
                    <div class="member-info">
                      <div class="member-avatar" style="background: linear-gradient(135deg, #52C41A, #22c55e);">李</div>
                      <div>
                        <div class="member-name">李四</div>
                        <div class="member-phone">139****5678</div>
                      </div>
                    </div>
                  </td>
                  <td>运营部</td>
                  <td><span class="role-tag manager">主管</span></td>
                  <td><span class="status-dot active"></span>在职</td>
                  <td>
                    <div class="action-btns">
                      <button class="action-btn edit">编辑</button>
                      <button class="action-btn delete">删除</button>
                    </div>
                  </td>
                </tr>
                <tr>
                  <td>
                    <div class="member-info">
                      <div class="member-avatar" style="background: linear-gradient(135deg, #722ED1, #9254de);">王</div>
                      <div>
                        <div class="member-name">王五</div>
                        <div class="member-phone">137****9012</div>
                      </div>
                    </div>
                  </td>
                  <td>客服部</td>
                  <td><span class="role-tag staff">员工</span></td>
                  <td><span class="status-dot active"></span>在职</td>
                  <td>
                    <div class="action-btns">
                      <button class="action-btn edit">编辑</button>
                      <button class="action-btn delete">删除</button>
                    </div>
                  </td>
                </tr>
                <tr>
                  <td>
                    <div class="member-info">
                      <div class="member-avatar" style="background: linear-gradient(135deg, #FAAD14, #ffc53d);">赵</div>
                      <div>
                        <div class="member-name">赵六</div>
                        <div class="member-phone">136****3456</div>
                      </div>
                    </div>
                  </td>
                  <td>财务部</td>
                  <td><span class="role-tag staff">员工</span></td>
                  <td><span class="status-dot inactive"></span>离职</td>
                  <td>
                    <div class="action-btns">
                      <button class="action-btn edit">编辑</button>
                      <button class="action-btn delete">删除</button>
                    </div>
                  </td>
                </tr>
                <tr>
                  <td>
                    <div class="member-info">
                      <div class="member-avatar" style="background: linear-gradient(135deg, #FF4D4F, #ff7875);">孙</div>
                      <div>
                        <div class="member-name">孙七</div>
                        <div class="member-phone">135****7890</div>
                      </div>
                    </div>
                  </td>
                  <td>运营部</td>
                  <td><span class="role-tag staff">员工</span></td>
                  <td><span class="status-dot active"></span>在职</td>
                  <td>
                    <div class="action-btns">
                      <button class="action-btn edit">编辑</button>
                      <button class="action-btn delete">删除</button>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
          
          <div class="pagination">
            <span class="pagination-info">共 20 条记录，每页 10 条</span>
            <div class="pagination-btns">
              <button class="page-btn"><i class="fas fa-chevron-left"></i></button>
              <button class="page-btn active">1</button>
              <button class="page-btn">2</button>
              <button class="page-btn"><i class="fas fa-chevron-right"></i></button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
