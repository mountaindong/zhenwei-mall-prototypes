<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>臻伟福利 - 账户设置（PC端）</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { 
      height: 100%;
      background: #f0f2f5; 
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; }
    
    /* 整体布局 */
    .app-container {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    
    /* 侧边导航 */
    .sidebar {
      width: 220px;
      background: #001529;
      color: white;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .sidebar-logo i {
      font-size: 24px;
      color: #52C41A;
    }
    
    .sidebar-logo span {
      font-size: 18px;
      font-weight: 600;
    }
    
    .sidebar-menu {
      flex: 1;
      padding: 12px 0;
      overflow-y: auto;
    }
    
    .menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      color: rgba(255,255,255,0.65);
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
    }
    
    .menu-item:hover {
      background: rgba(255,255,255,0.08);
      color: white;
    }
    
    .menu-item.active {
      background: #52C41A;
      color: white;
    }
    
    .menu-item i {
      font-size: 16px;
      width: 20px;
      text-align: center;
    }
    
    .menu-item span {
      font-size: 14px;
    }
    
    /* 主内容区 */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    /* 顶部栏 */
    .topbar {
      height: 60px;
      background: white;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }
    
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .topbar-title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
    }
    
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    
    .notification-btn {
      position: relative;
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      transition: background 0.3s;
    }
    
    .notification-btn:hover {
      background: #f5f5f5;
    }
    
    .notification-btn i {
      font-size: 18px;
      color: #666;
    }
    
    .notification-badge {
      position: absolute;
      top: 2px;
      right: 2px;
      background: #FF4D4F;
      color: white;
      font-size: 10px;
      min-width: 16px;
      height: 16px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }
    
    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 8px;
      transition: background 0.3s;
    }
    
    .user-info:hover {
      background: #f5f5f5;
    }
    
    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #52C41A, #22c55e);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
    }
    
    .user-name {
      font-size: 14px;
      color: #333;
    }
    
    /* 内容区 */
    .content-area {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      gap: 24px;
    }
    
    /* 左侧菜单 */
    .side-menu {
      width: 200px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      padding: 8px 0;
      flex-shrink: 0;
      height: fit-content;
    }
    
    .side-menu-item {
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.3s;
      color: #666;
      border-left: 3px solid transparent;
    }
    
    .side-menu-item:hover {
      background: #f5f5f5;
      color: #333;
    }
    
    .side-menu-item.active {
      background: #e6f7ff;
      color: #1890FF;
      border-left-color: #1890FF;
    }
    
    .side-menu-item i {
      font-size: 16px;
      width: 20px;
      text-align: center;
    }
    
    .side-menu-item span {
      font-size: 14px;
    }
    
    /* 右侧内容 */
    .content-section {
      flex: 1;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    
    .section-header {
      padding: 20px 24px;
      border-bottom: 1px solid #f0f0f0;
    }
    
    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .section-title i {
      color: #1890FF;
    }
    
    .section-body {
      padding: 24px;
    }
    
    /* 表单样式 */
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-label {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
      display: block;
    }
    
    .form-label .required {
      color: #FF4D4F;
      margin-left: 4px;
    }
    
    .form-input {
      width: 100%;
      max-width: 400px;
      padding: 10px 14px;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      font-size: 14px;
      transition: all 0.3s;
    }
    
    .form-input:focus {
      outline: none;
      border-color: #1890FF;
      box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.1);
    }
    
    .form-input:disabled {
      background: #f5f5f5;
      color: #999;
    }
    
    .form-hint {
      font-size: 12px;
      color: #999;
      margin-top: 6px;
    }
    
    /* 头像上传 */
    .avatar-upload {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    
    .avatar-preview {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #52C41A, #22c55e);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 32px;
      position: relative;
      overflow: hidden;
    }
    
    .avatar-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .avatar-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .upload-btn {
      padding: 8px 16px;
      background: white;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      font-size: 14px;
      color: #666;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.3s;
    }
    
    .upload-btn:hover {
      border-color: #1890FF;
      color: #1890FF;
    }
    
    .avatar-hint {
      font-size: 12px;
      color: #999;
    }
    
    /* 按钮 */
    .btn {
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.3s;
    }
    
    .btn-primary {
      background: #1890FF;
      color: white;
      border: none;
    }
    
    .btn-primary:hover {
      background: #40a9ff;
    }
    
    .btn-default {
      background: white;
      color: #666;
      border: 1px solid #d9d9d9;
    }
    
    .btn-default:hover {
      border-color: #1890FF;
      color: #1890FF;
    }
    
    .form-actions {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      gap: 12px;
    }
    
    /* 操作记录 */
    .record-list {
      display: flex;
      flex-direction: column;
    }
    
    .record-item {
      padding: 16px 0;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    
    .record-item:last-child {
      border-bottom: none;
    }
    
    .record-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .record-action {
      font-size: 14px;
      color: #333;
    }
    
    .record-time {
      font-size: 12px;
      color: #999;
    }
    
    .record-ip {
      font-size: 12px;
      color: #999;
      background: #f5f5f5;
      padding: 2px 8px;
      border-radius: 4px;
    }
    
    /* 开关 */
    .switch-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .switch {
      width: 44px;
      height: 22px;
      background: #d9d9d9;
      border-radius: 11px;
      position: relative;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .switch.active {
      background: #52C41A;
    }
    
    .switch::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: all 0.3s;
    }
    
    .switch.active::after {
      left: 24px;
    }
    
    .switch-label {
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- 侧边导航 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <i class="fas fa-store"></i>
          <span>商家工作台</span>
        </div>
      </div>
      <nav class="sidebar-menu">
        <a href="merchant-home.html" class="menu-item">
          <i class="fas fa-home"></i>
          <span>工作台</span>
        </a>
        <a href="merchant-exchange.html" class="menu-item">
          <i class="fas fa-exchange-alt"></i>
          <span>订单兑换</span>
        </a>
        <a href="merchant-exchange-manage.html" class="menu-item">
          <i class="fas fa-gift"></i>
          <span>兑换管理</span>
        </a>
        <a href="merchant-stats.html" class="menu-item">
          <i class="fas fa-chart-bar"></i>
          <span>数据统计</span>
        </a>
        <a href="merchant-organization.html" class="menu-item">
          <i class="fas fa-sitemap"></i>
          <span>组织架构</span>
        </a>
        <a href="merchant-permission.html" class="menu-item">
          <i class="fas fa-shield-alt"></i>
          <span>权限管理</span>
        </a>
        <a href="merchant-mini-profile.html" class="menu-item active">
          <i class="fas fa-user-circle"></i>
          <span>账户设置</span>
        </a>
      </nav>
    </aside>
    
    <!-- 主内容区 -->
    <main class="main-content">
      <!-- 顶部栏 -->
      <header class="topbar">
        <div class="topbar-left">
          <h1 class="topbar-title">账户设置</h1>
        </div>
        <div class="topbar-right">
          <div class="notification-btn">
            <i class="fas fa-bell"></i>
            <span class="notification-badge">3</span>
          </div>
          <div class="user-info">
            <div class="user-avatar">
              <i class="fas fa-user"></i>
            </div>
            <span class="user-name">张三店铺</span>
          </div>
        </div>
      </header>
      
      <!-- 内容区 -->
      <div class="content-area">
        <!-- 左侧菜单 -->
        <div class="side-menu">
          <div class="side-menu-item active">
            <i class="fas fa-user"></i>
            <span>账户设置</span>
          </div>
          <div class="side-menu-item">
            <i class="fas fa-shield-alt"></i>
            <span>安全设置</span>
          </div>
          <div class="side-menu-item">
            <i class="fas fa-bell"></i>
            <span>消息通知</span>
          </div>
          <div class="side-menu-item">
            <i class="fas fa-history"></i>
            <span>操作记录</span>
          </div>
        </div>
        
        <!-- 右侧内容 -->
        <div class="content-section">
          <div class="section-header">
            <div class="section-title">
              <i class="fas fa-user"></i>
              账户设置
            </div>
          </div>
          <div class="section-body">
            <!-- 头像上传 -->
            <div class="form-group">
              <label class="form-label">店铺头像</label>
              <div class="avatar-upload">
                <div class="avatar-preview">
                  <i class="fas fa-store"></i>
                </div>
                <div class="avatar-actions">
                  <button class="upload-btn">
                    <i class="fas fa-upload"></i>
                    上传头像
                  </button>
                  <span class="avatar-hint">支持 jpg、png 格式，大小不超过 2MB</span>
                </div>
              </div>
            </div>
            
            <!-- 店铺名称 -->
            <div class="form-group">
              <label class="form-label">店铺名称<span class="required">*</span></label>
              <input type="text" class="form-input" value="张三店铺" placeholder="请输入店铺名称">
              <span class="form-hint">店铺名称将在前台展示给用户</span>
            </div>
            
            <!-- 联系人 -->
            <div class="form-group">
              <label class="form-label">联系人<span class="required">*</span></label>
              <input type="text" class="form-input" value="张三" placeholder="请输入联系人姓名">
            </div>
            
            <!-- 联系电话 -->
            <div class="form-group">
              <label class="form-label">联系电话<span class="required">*</span></label>
              <input type="text" class="form-input" value="138****1234" placeholder="请输入联系电话">
            </div>
            
            <!-- 店铺地址 -->
            <div class="form-group">
              <label class="form-label">店铺地址</label>
              <input type="text" class="form-input" value="北京市朝阳区建国路**号" placeholder="请输入店铺地址">
            </div>
            
            <!-- 店铺简介 -->
            <div class="form-group">
              <label class="form-label">店铺简介</label>
              <textarea class="form-input" style="min-height: 100px; resize: vertical;" placeholder="请输入店铺简介">专注数码配件销售，品质保证，服务周到。</textarea>
              <span class="form-hint">简短描述您的店铺特色，200字以内</span>
            </div>
            
            <!-- 通知开关 -->
            <div class="form-group">
              <label class="form-label">订单通知</label>
              <div class="switch-wrapper">
                <div class="switch active"></div>
                <span class="switch-label">新订单时发送短信通知</span>
              </div>
            </div>
            
            <!-- 操作按钮 -->
            <div class="form-actions">
              <button class="btn btn-primary">
                <i class="fas fa-save"></i>
                保存修改
              </button>
              <button class="btn btn-default">
                <i class="fas fa-undo"></i>
                重置
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
