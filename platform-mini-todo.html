<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>臻伟福利系统 - 待办事项</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    .mini-app {
      width: 390px;
      height: 844px;
      background: #f5f7fa;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .status-bar {
      height: 44px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      font-size: 14px;
      font-weight: 500;
    }
    .status-bar .time { font-weight: 600; }
    .status-bar .icons { display: flex; gap: 4px; align-items: center; }
    .header {
      background: linear-gradient(135deg, #1890FF, #40a9ff);
      padding: 16px 20px 24px;
      color: white;
    }
    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .header-title .logo {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .header-title h1 {
      font-size: 18px;
      font-weight: 600;
    }
    .header-subtitle {
      font-size: 12px;
      opacity: 0.85;
      margin-top: 4px;
    }
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 100px;
      margin-top: -8px;
    }
    .stats-row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat-item {
      flex: 1;
      background: white;
      border-radius: 12px;
      padding: 14px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .stat-number {
      font-size: 24px;
      font-weight: 700;
      color: #1890FF;
    }
    .stat-number.urgent { color: #FF4D4F; }
    .stat-number.warning { color: #FAAD14; }
    .stat-label {
      font-size: 11px;
      color: #999;
      margin-top: 4px;
    }
    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: #333;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .todo-section {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: #fafafa;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .todo-item:hover {
      background: #f0f0f0;
    }
    .todo-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .todo-icon.red { background: #fff2f0; color: #FF4D4F; }
    .todo-icon.orange { background: #fff7e6; color: #FA8C16; }
    .todo-icon.yellow { background: #fffbe6; color: #FAAD14; }
    .todo-icon.blue { background: #e6f7ff; color: #1890FF; }
    .todo-content {
      flex: 1;
    }
    .todo-title {
      font-size: 14px;
      color: #333;
      font-weight: 500;
    }
    .todo-desc {
      font-size: 12px;
      color: #999;
      margin-top: 2px;
    }
    .todo-badge {
      background: #FF4D4F;
      color: white;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      min-width: 20px;
      text-align: center;
    }
    .todo-badge.orange { background: #FA8C16; }
    .todo-badge.blue { background: #1890FF; }
    .todo-arrow {
      color: #ccc;
      font-size: 12px;
    }
    .bottom-nav {
      flex-shrink: 0;
      background: white;
      border-top: 1px solid #f0f0f0;
      display: flex;
      flex-direction: column;
    }
    .nav-items {
      display: flex;
      height: 56px;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-item i {
      font-size: 20px;
      color: #999;
    }
    .nav-item span {
      font-size: 10px;
      color: #999;
    }
    .nav-item.active i { color: #1890FF; }
    .nav-item.active span { color: #1890FF; font-weight: 500; }
    .safe-area {
      height: 34px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .home-indicator {
      width: 134px;
      height: 5px;
      background: #333;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="mini-app">
    <div class="status-bar">
      <span class="time">11:08</span>
      <div class="icons">
        <i class="fas fa-signal" style="font-size:12px"></i>
        <i class="fas fa-wifi" style="font-size:12px"></i>
        <i class="fas fa-battery-full" style="font-size:14px"></i>
      </div>
    </div>
    <div class="header">
      <div class="header-title">
        <div class="logo">
          <i class="fas fa-clipboard-list" style="font-size:18px"></i>
        </div>
        <div>
          <h1>待办事项</h1>
          <div class="header-subtitle">需要处理的任务</div>
        </div>
      </div>
    </div>
    <div class="main-content">
      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-number urgent">10</div>
          <div class="stat-label">待处理</div>
        </div>
        <div class="stat-item">
          <div class="stat-number warning">3</div>
          <div class="stat-label">紧急</div>
        </div>
        <div class="stat-item">
          <div class="stat-number">5</div>
          <div class="stat-label">今日截止</div>
        </div>
      </div>
      <div class="section-title">
        <span><i class="fas fa-exclamation-circle" style="color:#FF4D4F;margin-right:6px"></i>紧急待办</span>
      </div>
      <div class="todo-section">
        <div class="todo-list">
          <div class="todo-item">
            <div class="todo-icon red">
              <i class="fas fa-store"></i>
            </div>
            <div class="todo-content">
              <div class="todo-title">商家入驻审核</div>
              <div class="todo-desc">有新商家申请入驻，等待审核</div>
            </div>
            <div class="todo-badge">3</div>
            <i class="fas fa-chevron-right todo-arrow"></i>
          </div>
          <div class="todo-item">
            <div class="todo-icon orange">
              <i class="fas fa-money-bill-wave"></i>
            </div>
            <div class="todo-content">
              <div class="todo-title">提现审核</div>
              <div class="todo-desc">商家提现申请待处理</div>
            </div>
            <div class="todo-badge orange">5</div>
            <i class="fas fa-chevron-right todo-arrow"></i>
          </div>
          <div class="todo-item">
            <div class="todo-icon yellow">
              <i class="fas fa-exclamation-circle"></i>
            </div>
            <div class="todo-content">
              <div class="todo-title">投诉处理</div>
              <div class="todo-desc">用户投诉需要跟进处理</div>
            </div>
            <div class="todo-badge orange">2</div>
            <i class="fas fa-chevron-right todo-arrow"></i>
          </div>
        </div>
      </div>
      <div class="section-title">
        <span><i class="fas fa-clock" style="color:#1890FF;margin-right:6px"></i>其他待办</span>
      </div>
      <div class="todo-section">
        <div class="todo-list">
          <div class="todo-item">
            <div class="todo-icon blue">
              <i class="fas fa-box"></i>
            </div>
            <div class="todo-content">
              <div class="todo-title">商品审核</div>
              <div class="todo-desc">新商品上架申请</div>
            </div>
            <div class="todo-badge blue">8</div>
            <i class="fas fa-chevron-right todo-arrow"></i>
          </div>
          <div class="todo-item">
            <div class="todo-icon blue">
              <i class="fas fa-file-alt"></i>
            </div>
            <div class="todo-content">
              <div class="todo-title">合同签署</div>
              <div class="todo-desc">商家合同待确认签署</div>
            </div>
            <div class="todo-badge blue">2</div>
            <i class="fas fa-chevron-right todo-arrow"></i>
          </div>
        </div>
      </div>
    </div>
    <div class="bottom-nav">
      <div class="nav-items">
        <div class="nav-item">
          <i class="fas fa-home"></i>
          <span>首页</span>
        </div>
        <div class="nav-item">
          <i class="fas fa-chart-bar"></i>
          <span>数据</span>
        </div>
        <div class="nav-item active">
          <i class="fas fa-clipboard-list"></i>
          <span>待办</span>
        </div>
        <div class="nav-item">
          <i class="fas fa-user"></i>
          <span>我的</span>
        </div>
      </div>
      <div class="safe-area">
        <div class="home-indicator"></div>
      </div>
    </div>
  </div>
</body>
</html>
