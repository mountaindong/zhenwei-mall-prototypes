<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>臻伟福利 - 销售端统计原型</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #e5e5e5; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; }
    
    .phone-frame {
      width: 390px;
      min-height: 100vh;
      margin: 0 auto;
      background: #f5f5f5;
      box-shadow: 0 0 30px rgba(0,0,0,0.2);
      position: relative;
      display: flex;
      flex-direction: column;
    }
    
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 20px;
    }
    
    .bottom-nav {
      width: 390px;
      margin: 0 auto;
      height: 56px;
      background: white;
      border-top: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      flex-shrink: 0;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #999;
      cursor: pointer;
      padding: 6px 24px;
    }
    .nav-item.active { color: #1890FF; }
    .nav-item i { font-size: 20px; margin-bottom: 2px; }
    .nav-item span { font-size: 11px; }
    
    .stat-card {
      transition: transform 0.2s;
    }
    .stat-card:active {
      transform: scale(0.98);
    }
    
    .tab-item {
      padding: 8px 16px;
      font-size: 13px;
      color: #666;
      background: #f0f0f0;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-item.active {
      background: linear-gradient(135deg,#1890FF,#40a9ff);
      color: white;
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="scroll-area">
      <!-- 状态栏 -->
      <div style="height:44px;background:linear-gradient(135deg,#1890FF,#40a9ff)"></div>
      
      <!-- 导航栏 -->
      <div style="background:linear-gradient(135deg,#1890FF,#40a9ff);padding:8px 16px;display:flex;align-items:center;justify-content:space-between">
        <i class="fas fa-arrow-left" style="color:white;font-size:18px;cursor:pointer" onclick="location.href='sales-home.html'"></i>
        <span style="color:white;font-size:18px;font-weight:600">销售统计</span>
        <i class="fas fa-download" style="color:white;font-size:18px;cursor:pointer"></i>
      </div>
      
      <!-- 核心数据卡片 -->
      <div style="background:linear-gradient(135deg,#1890FF,#40a9ff);padding:0 16px 24px">
        <div style="background:white;border-radius:16px;padding:20px;box-shadow:0 4px 16px rgba(0,0,0,0.08)">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
            <span style="font-size:13px;color:#999">本月销售额</span>
            <span style="font-size:12px;color:#1890FF"><i class="fas fa-calendar-alt" style="margin-right:4px"></i>2024年3月</span>
          </div>
          <div style="text-align:center;margin-bottom:16px">
            <div style="font-size:36px;font-weight:600;color:#333;margin-bottom:8px">¥58,920</div>
            <div style="display:flex;align-items:center;justify-content:center;gap:4px">
              <i class="fas fa-arrow-up" style="color:#52C41A;font-size:12px"></i>
              <span style="color:#52C41A;font-size:13px">较上月增长 12.5%</span>
            </div>
          </div>
          
          <!-- 迷你图表 -->
          <div style="height:60px;background:linear-gradient(to right,rgba(24,144,255,0.1),rgba(24,144,255,0.05));border-radius:8px;display:flex;align-items:flex-end;padding:0 8px;gap:4px">
            <div style="flex:1;height:30%;background:#1890FF;border-radius:4px 4px 0 0"></div>
            <div style="flex:1;height:45%;background:#1890FF;border-radius:4px 4px 0 0"></div>
            <div style="flex:1;height:35%;background:#1890FF;border-radius:4px 4px 0 0"></div>
            <div style="flex:1;height:60%;background:#1890FF;border-radius:4px 4px 0 0"></div>
            <div style="flex:1;height:50%;background:#1890FF;border-radius:4px 4px 0 0"></div>
            <div style="flex:1;height:70%;background:#1890FF;border-radius:4px 4px 0 0"></div>
            <div style="flex:1;height:80%;background:#FF6B00;border-radius:4px 4px 0 0"></div>
          </div>
        </div>
      </div>
      
      <!-- 数据概览 -->
      <div style="padding:0 16px 16px">
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">
          <div class="stat-card" style="background:white;border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06)">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
              <div style="width:32px;height:32px;border-radius:8px;background:#E6F7FF;display:flex;align-items:center;justify-content:center">
                <i class="fas fa-shopping-bag" style="color:#1890FF;font-size:16px"></i>
              </div>
              <span style="font-size:12px;color:#52C41A">+8%</span>
            </div>
            <div style="font-size:20px;font-weight:600;color:#333">156</div>
            <div style="font-size:12px;color:#999;margin-top:4px">订单总数</div>
          </div>
          
          <div class="stat-card" style="background:white;border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06)">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
              <div style="width:32px;height:32px;border-radius:8px;background:#FFF7E6;display:flex;align-items:center;justify-content:center">
                <i class="fas fa-coins" style="color:#FF6B00;font-size:16px"></i>
              </div>
              <span style="font-size:12px;color:#52C41A">+15%</span>
            </div>
            <div style="font-size:20px;font-weight:600;color:#333">¥5,892</div>
            <div style="font-size:12px;color:#999;margin-top:4px">累计佣金</div>
          </div>
          
          <div class="stat-card" style="background:white;border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06)">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
              <div style="width:32px;height:32px;border-radius:8px;background:#F6FFED;display:flex;align-items:center;justify-content:center">
                <i class="fas fa-users" style="color:#52C41A;font-size:16px"></i>
              </div>
              <span style="font-size:12px;color:#52C41A">+23</span>
            </div>
            <div style="font-size:20px;font-weight:600;color:#333">89</div>
            <div style="font-size:12px;color:#999;margin-top:4px">客户总数</div>
          </div>
          
          <div class="stat-card" style="background:white;border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06)">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
              <div style="width:32px;height:32px;border-radius:8px;background:#FFF0F6;display:flex;align-items:center;justify-content:center">
                <i class="fas fa-user-check" style="color:#EB2F96;font-size:16px"></i>
              </div>
              <span style="font-size:12px;color:#52C41A">+5%</span>
            </div>
            <div style="font-size:20px;font-weight:600;color:#333">378</div>
            <div style="font-size:12px;color:#999;margin-top:4px">转化率</div>
          </div>
        </div>
      </div>
      
      <!-- 时间筛选 -->
      <div style="padding:0 16px 16px">
        <div style="display:flex;gap:8px;overflow-x:auto">
          <div class="tab-item active">今日</div>
          <div class="tab-item">本周</div>
          <div class="tab-item">本月</div>
          <div class="tab-item">本季度</div>
          <div class="tab-item">自定义</div>
        </div>
      </div>
      
      <!-- 销售趋势 -->
      <div style="padding:0 16px 16px">
        <div style="background:white;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06)">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
            <span style="font-size:15px;font-weight:600;color:#333">销售趋势</span>
            <span style="font-size:12px;color:#1890FF;cursor:pointer">详情 <i class="fas fa-chevron-right" style="font-size:10px"></i></span>
          </div>
          
          <div style="height:120px;background:linear-gradient(to bottom,rgba(24,144,255,0.1),transparent);border-radius:8px;position:relative;padding:12px">
            <!-- 简易图表 -->
            <svg width="100%" height="100%" viewBox="0 0 300 80">
              <polyline points="0,60 50,45 100,50 150,30 200,35 250,20 300,15" fill="none" stroke="#1890FF" stroke-width="2"/>
              <circle cx="0" cy="60" r="3" fill="#1890FF"/>
              <circle cx="50" cy="45" r="3" fill="#1890FF"/>
              <circle cx="100" cy="50" r="3" fill="#1890FF"/>
              <circle cx="150" cy="30" r="3" fill="#1890FF"/>
              <circle cx="200" cy="35" r="3" fill="#1890FF"/>
              <circle cx="250" cy="20" r="3" fill="#1890FF"/>
              <circle cx="300" cy="15" r="4" fill="#FF6B00"/>
            </svg>
          </div>
          
          <div style="display:flex;justify-content:space-between;margin-top:12px;font-size:11px;color:#999">
            <span>周一</span>
            <span>周二</span>
            <span>周三</span>
            <span>周四</span>
            <span>周五</span>
            <span>周六</span>
            <span style="color:#FF6B00;font-weight:600">今天</span>
          </div>
        </div>
      </div>
      
      <!-- 热销商品 -->
      <div style="padding:0 16px 16px">
        <div style="background:white;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06)">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
            <span style="font-size:15px;font-weight:600;color:#333">热销商品</span>
            <span style="font-size:12px;color:#1890FF;cursor:pointer">更多 <i class="fas fa-chevron-right" style="font-size:10px"></i></span>
          </div>
          
          <div style="display:flex;flex-direction:column;gap:12px">
            <div style="display:flex;align-items:center;gap:12px">
              <div style="width:24px;height:24px;background:#FF4D4F;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600">1</div>
              <img src="https://picsum.photos/seed/hot1/40/40" style="width:40px;height:40px;border-radius:8px;object-fit:cover">
              <div style="flex:1">
                <div style="font-size:13px;color:#333">臻选有机绿茶礼盒装</div>
                <div style="font-size:11px;color:#999">销量: 128件</div>
              </div>
              <div style="text-align:right">
                <div style="font-size:14px;color:#FF4D4F;font-weight:600">¥128</div>
              </div>
            </div>
            
            <div style="display:flex;align-items:center;gap:12px">
              <div style="width:24px;height:24px;background:#FF6B00;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600">2</div>
              <img src="https://picsum.photos/seed/hot2/40/40" style="width:40px;height:40px;border-radius:8px;object-fit:cover">
              <div style="flex:1">
                <div style="font-size:13px;color:#333">智能保温杯 500ml</div>
                <div style="font-size:11px;color:#999">销量: 98件</div>
              </div>
              <div style="text-align:right">
                <div style="font-size:14px;color:#FF4D4F;font-weight:600">¥89</div>
              </div>
            </div>
            
            <div style="display:flex;align-items:center;gap:12px">
              <div style="width:24px;height:24px;background:#FFB800;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600">3</div>
              <img src="https://picsum.photos/seed/hot3/40/40" style="width:40px;height:40px;border-radius:8px;object-fit:cover">
              <div style="flex:1">
                <div style="font-size:13px;color:#333">纯棉毛巾套装 3条装</div>
                <div style="font-size:11px;color:#999">销量: 86件</div>
              </div>
              <div style="text-align:right">
                <div style="font-size:14px;color:#FF4D4F;font-weight:600">¥39</div>
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <!-- 客户分布 -->
      <div style="padding:0 16px 16px">
        <div style="background:white;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06)">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
            <span style="font-size:15px;font-weight:600;color:#333">客户分布</span>
          </div>
          
          <div style="display:flex;flex-direction:column;gap:10px">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:12px;color:#666;width:48px">VIP客户</span>
              <div style="flex:1;height:8px;background:#f0f0f0;border-radius:4px;overflow:hidden">
                <div style="width:15%;height:100%;background:#FF6B00;border-radius:4px"></div>
              </div>
              <span style="font-size:12px;color:#333;width:32px;text-align:right">15%</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:12px;color:#666;width:48px">老客户</span>
              <div style="flex:1;height:8px;background:#f0f0f0;border-radius:4px;overflow:hidden">
                <div style="width:45%;height:100%;background:#1890FF;border-radius:4px"></div>
              </div>
              <span style="font-size:12px;color:#333;width:32px;text-align:right">45%</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:12px;color:#666;width:48px">新客户</span>
              <div style="flex:1;height:8px;background:#f0f0f0;border-radius:4px;overflow:hidden">
                <div style="width:40%;height:100%;background:#52C41A;border-radius:4px"></div>
              </div>
              <span style="font-size:12px;color:#333;width:32px;text-align:right">40%</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- 底部导航 -->
    <nav class="bottom-nav">
      <div class="nav-item" onclick="location.href='sales-home.html'">
        <i class="fas fa-home"></i>
        <span>首页</span>
      </div>
      <div class="nav-item" onclick="location.href='sales-product.html'">
        <i class="fas fa-box"></i>
        <span>商品</span>
      </div>
      <div class="nav-item active" onclick="location.href='sales-stats.html'">
        <i class="fas fa-chart-line"></i>
        <span>统计</span>
      </div>
      <div class="nav-item" onclick="location.href='sales-profile.html'">
        <i class="fas fa-user"></i>
        <span>我的</span>
      </div>
    </nav>
  </div>

  <script>
    // 标签切换
    document.querySelectorAll('.tab-item').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
      });
    });
  </script>
</body>
</html>
