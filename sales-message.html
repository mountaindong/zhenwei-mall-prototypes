<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>臻伟福利 - 销售端消息原型</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #e5e5e5; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; }
    
    .phone-frame {
      width: 390px;
      min-height: 100vh;
      margin: 0 auto;
      background: #f5f5f5;
      box-shadow: 0 0 30px rgba(0,0,0,0.2);
      position: relative;
      display: flex;
      flex-direction: column;
    }
    
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 20px;
    }
    
    .bottom-nav {
      width: 390px;
      margin: 0 auto;
      height: 56px;
      background: white;
      border-top: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      flex-shrink: 0;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #999;
      cursor: pointer;
      padding: 6px 24px;
    }
    .nav-item.active { color: #1890FF; }
    .nav-item i { font-size: 20px; margin-bottom: 2px; }
    .nav-item span { font-size: 11px; }
    
    .msg-item {
      transition: background 0.2s;
    }
    .msg-item:active {
      background: #f5f5f5;
    }
    
    .unread-dot {
      width: 8px;
      height: 8px;
      background: #FF4D4F;
      border-radius: 50%;
      position: absolute;
      top: 0;
      right: 0;
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="scroll-area">
      <!-- 状态栏 -->
      <div style="height:44px;background:linear-gradient(135deg,#1890FF,#40a9ff)"></div>
      
      <!-- 导航栏 -->
      <div style="background:linear-gradient(135deg,#1890FF,#40a9ff);padding:8px 16px;display:flex;align-items:center;justify-content:space-between">
        <i class="fas fa-arrow-left" style="color:white;font-size:18px;cursor:pointer" onclick="location.href='sales-home.html'"></i>
        <span style="color:white;font-size:18px;font-weight:600">消息中心</span>
        <i class="fas fa-cog" style="color:white;font-size:18px;cursor:pointer"></i>
      </div>
      
      <!-- 消息统计 -->
      <div style="background:linear-gradient(135deg,#1890FF,#40a9ff);padding:0 16px 20px">
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
          <div style="background:rgba(255,255,255,0.15);border-radius:12px;padding:12px;text-align:center">
            <div style="font-size:22px;font-weight:600;color:white">5</div>
            <div style="font-size:11px;color:rgba(255,255,255,0.8);margin-top:2px">未读消息</div>
          </div>
          <div style="background:rgba(255,255,255,0.15);border-radius:12px;padding:12px;text-align:center">
            <div style="font-size:22px;font-weight:600;color:white">2</div>
            <div style="font-size:11px;color:rgba(255,255,255,0.8);margin-top:2px">系统通知</div>
          </div>
          <div style="background:rgba(255,255,255,0.15);border-radius:12px;padding:12px;text-align:center">
            <div style="font-size:22px;font-weight:600;color:white">3</div>
            <div style="font-size:11px;color:rgba(255,255,255,0.8);margin-top:2px">客户咨询</div>
          </div>
        </div>
      </div>
      
      <!-- 快捷入口 -->
      <div style="padding:16px">
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;text-align:center">
          <div style="cursor:pointer">
            <div style="width:48px;height:48px;margin:0 auto 8px;border-radius:12px;background:#E6F7FF;display:flex;align-items:center;justify-content:center;position:relative">
              <i class="fas fa-bell" style="color:#1890FF;font-size:20px"></i>
              <span class="unread-dot"></span>
            </div>
            <span style="font-size:12px;color:#666">系统通知</span>
          </div>
          <div style="cursor:pointer">
            <div style="width:48px;height:48px;margin:0 auto 8px;border-radius:12px;background:#FFF7E6;display:flex;align-items:center;justify-content:center;position:relative">
              <i class="fas fa-shopping-cart" style="color:#FF6B00;font-size:20px"></i>
              <span class="unread-dot"></span>
            </div>
            <span style="font-size:12px;color:#666">订单消息</span>
          </div>
          <div style="cursor:pointer">
            <div style="width:48px;height:48px;margin:0 auto 8px;border-radius:12px;background:#F6FFED;display:flex;align-items:center;justify-content:center;position:relative">
              <i class="fas fa-users" style="color:#52C41A;font-size:20px"></i>
              <span class="unread-dot"></span>
            </div>
            <span style="font-size:12px;color:#666">客户咨询</span>
          </div>
          <div style="cursor:pointer">
            <div style="width:48px;height:48px;margin:0 auto 8px;border-radius:12px;background:#FFF0F6;display:flex;align-items:center;justify-content:center">
              <i class="fas fa-bullhorn" style="color:#EB2F96;font-size:20px"></i>
            </div>
            <span style="font-size:12px;color:#666">活动通知</span>
          </div>
        </div>
      </div>
      
      <!-- 消息列表 -->
      <div style="padding:0 16px">
        <div style="font-size:14px;font-weight:600;color:#333;margin-bottom:12px">最近消息</div>
        
        <div style="display:flex;flex-direction:column;gap:2px">
          
          <!-- 消息项1 -->
          <div class="msg-item" style="background:white;border-radius:12px;padding:14px;display:flex;gap:12px;cursor:pointer;margin-bottom:8px">
            <div style="width:48px;height:48px;border-radius:50%;overflow:hidden;flex-shrink:0;position:relative">
              <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=msg1" alt="头像" style="width:100%;height:100%">
              <span class="unread-dot"></span>
            </div>
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
                <span style="font-size:15px;font-weight:500;color:#333">李明</span>
                <span style="font-size:11px;color:#999">10:30</span>
              </div>
              <div style="font-size:13px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">请问这款茶叶有优惠活动吗？</div>
            </div>
          </div>
          
          <!-- 消息项2 -->
          <div class="msg-item" style="background:white;border-radius:12px;padding:14px;display:flex;gap:12px;cursor:pointer;margin-bottom:8px">
            <div style="width:48px;height:48px;border-radius:50%;overflow:hidden;flex-shrink:0;position:relative">
              <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=msg2" alt="头像" style="width:100%;height:100%">
              <span class="unread-dot"></span>
            </div>
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
                <span style="font-size:15px;font-weight:500;color:#333">王芳</span>
                <span style="font-size:11px;color:#999">昨天</span>
              </div>
              <div style="font-size:13px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">我想问下订单什么时候发货？</div>
            </div>
          </div>
          
          <!-- 消息项3 -->
          <div class="msg-item" style="background:white;border-radius:12px;padding:14px;display:flex;gap:12px;cursor:pointer;margin-bottom:8px">
            <div style="width:48px;height:48px;border-radius:50%;overflow:hidden;flex-shrink:0;position:relative">
              <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=msg3" alt="头像" style="width:100%;height:100%">
              <span class="unread-dot"></span>
            </div>
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
                <span style="font-size:15px;font-weight:500;color:#333">张伟</span>
                <span style="font-size:11px;color:#999">昨天</span>
              </div>
              <div style="font-size:13px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">好的，那我就下单了</div>
            </div>
          </div>
          
          <!-- 系统消息 -->
          <div class="msg-item" style="background:white;border-radius:12px;padding:14px;display:flex;gap:12px;cursor:pointer;margin-bottom:8px">
            <div style="width:48px;height:48px;border-radius:50%;background:#E6F7FF;display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <i class="fas fa-bell" style="color:#1890FF;font-size:20px"></i>
            </div>
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
                <span style="font-size:15px;font-weight:500;color:#333">系统通知</span>
                <span style="font-size:11px;color:#999">03-15</span>
              </div>
              <div style="font-size:13px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">您有一笔新订单待处理，请及时跟进</div>
            </div>
          </div>
          
          <!-- 订单消息 -->
          <div class="msg-item" style="background:white;border-radius:12px;padding:14px;display:flex;gap:12px;cursor:pointer;margin-bottom:8px">
            <div style="width:48px;height:48px;border-radius:50%;background:#FFF7E6;display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <i class="fas fa-shopping-cart" style="color:#FF6B00;font-size:20px"></i>
            </div>
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
                <span style="font-size:15px;font-weight:500;color:#333">订单消息</span>
                <span style="font-size:11px;color:#999">03-14</span>
              </div>
              <div style="font-size:13px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">订单 #202403140001 已完成，您获得佣金 ¥12.8</div>
            </div>
          </div>
          
          <!-- 活动消息 -->
          <div class="msg-item" style="background:white;border-radius:12px;padding:14px;display:flex;gap:12px;cursor:pointer;margin-bottom:8px">
            <div style="width:48px;height:48px;border-radius:50%;background:#FFF0F6;display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <i class="fas fa-bullhorn" style="color:#EB2F96;font-size:20px"></i>
            </div>
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
                <span style="font-size:15px;font-weight:500;color:#333">活动通知</span>
                <span style="font-size:11px;color:#999">03-13</span>
              </div>
              <div style="font-size:13px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">限时特惠！精选商品低至5折，快来分享给客户</div>
            </div>
          </div>
          
          <!-- 已读消息 -->
          <div class="msg-item" style="background:white;border-radius:12px;padding:14px;display:flex;gap:12px;cursor:pointer;margin-bottom:8px">
            <div style="width:48px;height:48px;border-radius:50%;overflow:hidden;flex-shrink:0">
              <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=msg4" alt="头像" style="width:100%;height:100%">
            </div>
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
                <span style="font-size:15px;font-weight:500;color:#333">刘洋</span>
                <span style="font-size:11px;color:#999">03-12</span>
              </div>
              <div style="font-size:13px;color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">收到，谢谢推荐！</div>
            </div>
          </div>
          
        </div>
      </div>
    </div>
    
    <!-- 底部导航 -->
    <nav class="bottom-nav">
      <div class="nav-item" onclick="location.href='sales-home.html'">
        <i class="fas fa-home"></i>
        <span>首页</span>
      </div>
      <div class="nav-item" onclick="location.href='sales-product.html'">
        <i class="fas fa-box"></i>
        <span>商品</span>
      </div>
      <div class="nav-item active" onclick="location.href='sales-message.html'">
        <i class="fas fa-comment-dots"></i>
        <span>消息</span>
      </div>
      <div class="nav-item" onclick="location.href='sales-profile.html'">
        <i class="fas fa-user"></i>
        <span>我的</span>
      </div>
    </nav>
  </div>
</body>
</html>
