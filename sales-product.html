<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>臻伟福利 - 销售端商品页原型</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #e5e5e5; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; }
    
    .phone-frame {
      width: 390px;
      min-height: 100vh;
      margin: 0 auto;
      background: #f5f5f5;
      box-shadow: 0 0 30px rgba(0,0,0,0.2);
      position: relative;
      display: flex;
      flex-direction: column;
    }
    
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 20px;
    }
    
    .bottom-nav {
      width: 390px;
      margin: 0 auto;
      height: 56px;
      background: white;
      border-top: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      flex-shrink: 0;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #999;
      cursor: pointer;
      padding: 6px 24px;
    }
    .nav-item.active { color: #1890FF; }
    .nav-item i { font-size: 20px; margin-bottom: 2px; }
    .nav-item span { font-size: 11px; }
    
    /* 商品卡片样式 */
    .product-card {
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .product-card:active {
      transform: scale(0.98);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    /* 分类标签 */
    .category-tab {
      padding: 8px 16px;
      background: #f5f5f5;
      border-radius: 20px;
      font-size: 13px;
      color: #666;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
    }
    .category-tab.active {
      background: linear-gradient(135deg,#1890FF,#40a9ff);
      color: white;
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="scroll-area">
      <!-- 状态栏 -->
      <div style="height:44px;background:linear-gradient(135deg,#1890FF,#40a9ff)"></div>
      
      <!-- 搜索栏 -->
      <div style="background:linear-gradient(135deg,#1890FF,#40a9ff);padding:8px 16px 16px">
        <div style="background:white;border-radius:20px;padding:10px 16px;display:flex;align-items:center;gap:10px">
          <i class="fas fa-search" style="color:#999;font-size:14px"></i>
          <input type="text" placeholder="搜索商品" style="border:none;outline:none;flex:1;font-size:14px;background:transparent">
          <i class="fas fa-sliders-h" style="color:#1890FF;font-size:16px;cursor:pointer"></i>
        </div>
      </div>
      
      <!-- 分类标签 -->
      <div style="padding:12px 16px;background:white;overflow-x:auto;white-space:nowrap">
        <div style="display:inline-flex;gap:10px">
          <span class="category-tab active">全部</span>
          <span class="category-tab">福利商品</span>
          <span class="category-tab">热销</span>
          <span class="category-tab">新品</span>
          <span class="category-tab">限时特价</span>
          <span class="category-tab">高佣金</span>
        </div>
      </div>
      
      <!-- 商品列表 -->
      <div style="padding:12px 16px">
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">
          <!-- 商品卡片1 -->
          <div class="product-card" style="background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06)">
            <div style="position:relative">
              <img src="https://picsum.photos/seed/prod1/200/200" style="width:100%;height:150px;object-fit:cover">
              <span style="position:absolute;top:8px;left:8px;background:#FF4D4F;color:white;font-size:10px;padding:2px 8px;border-radius:10px">热销</span>
            </div>
            <div style="padding:10px">
              <div style="font-size:13px;color:#333;line-height:1.4;height:36px;overflow:hidden;margin-bottom:8px">臻选有机绿茶礼盒装 250g</div>
              <div style="display:flex;align-items:center;justify-content:space-between">
                <div>
                  <span style="color:#FF4D4F;font-size:16px;font-weight:600">¥128</span>
                  <span style="color:#999;font-size:11px;text-decoration:line-through;margin-left:4px">¥198</span>
                </div>
              </div>
              <div style="margin-top:6px;display:flex;align-items:center;justify-content:space-between">
                <span style="color:#FF6B00;font-size:11px;background:#FFF7E6;padding:2px 6px;border-radius:4px">佣金 ¥12.8</span>
                <span style="color:#999;font-size:11px">已售 2.3k</span>
              </div>
            </div>
          </div>
          
          <!-- 商品卡片2 -->
          <div class="product-card" style="background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06)">
            <div style="position:relative">
              <img src="https://picsum.photos/seed/prod2/200/200" style="width:100%;height:150px;object-fit:cover">
              <span style="position:absolute;top:8px;left:8px;background:#1890FF;color:white;font-size:10px;padding:2px 8px;border-radius:10px">新品</span>
            </div>
            <div style="padding:10px">
              <div style="font-size:13px;color:#333;line-height:1.4;height:36px;overflow:hidden;margin-bottom:8px">智能保温杯 500ml 温度显示</div>
              <div style="display:flex;align-items:center;justify-content:space-between">
                <div>
                  <span style="color:#FF4D4F;font-size:16px;font-weight:600">¥89</span>
                  <span style="color:#999;font-size:11px;text-decoration:line-through;margin-left:4px">¥129</span>
                </div>
              </div>
              <div style="margin-top:6px;display:flex;align-items:center;justify-content:space-between">
                <span style="color:#FF6B00;font-size:11px;background:#FFF7E6;padding:2px 6px;border-radius:4px">佣金 ¥8.9</span>
                <span style="color:#999;font-size:11px">已售 1.8k</span>
              </div>
            </div>
          </div>
          
          <!-- 商品卡片3 -->
          <div class="product-card" style="background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06)">
            <div style="position:relative">
              <img src="https://picsum.photos/seed/prod3/200/200" style="width:100%;height:150px;object-fit:cover">
              <span style="position:absolute;top:8px;left:8px;background:#52C41A;color:white;font-size:10px;padding:2px 8px;border-radius:10px">福利</span>
            </div>
            <div style="padding:10px">
              <div style="font-size:13px;color:#333;line-height:1.4;height:36px;overflow:hidden;margin-bottom:8px">纯棉毛巾套装 3条装</div>
              <div style="display:flex;align-items:center;justify-content:space-between">
                <div>
                  <span style="color:#FF4D4F;font-size:16px;font-weight:600">¥39</span>
                  <span style="color:#999;font-size:11px;text-decoration:line-through;margin-left:4px">¥59</span>
                </div>
              </div>
              <div style="margin-top:6px;display:flex;align-items:center;justify-content:space-between">
                <span style="color:#FF6B00;font-size:11px;background:#FFF7E6;padding:2px 6px;border-radius:4px">佣金 ¥3.9</span>
                <span style="color:#999;font-size:11px">已售 5.6k</span>
              </div>
            </div>
          </div>
          
          <!-- 商品卡片4 -->
          <div class="product-card" style="background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06)">
            <div style="position:relative">
              <img src="https://picsum.photos/seed/prod4/200/200" style="width:100%;height:150px;object-fit:cover">
              <span style="position:absolute;top:8px;left:8px;background:#FF6B00;color:white;font-size:10px;padding:2px 8px;border-radius:10px">高佣</span>
            </div>
            <div style="padding:10px">
              <div style="font-size:13px;color:#333;line-height:1.4;height:36px;overflow:hidden;margin-bottom:8px">进口牛排套餐 8片装 冰鲜</div>
              <div style="display:flex;align-items:center;justify-content:space-between">
                <div>
                  <span style="color:#FF4D4F;font-size:16px;font-weight:600">¥299</span>
                  <span style="color:#999;font-size:11px;text-decoration:line-through;margin-left:4px">¥399</span>
                </div>
              </div>
              <div style="margin-top:6px;display:flex;align-items:center;justify-content:space-between">
                <span style="color:#FF6B00;font-size:11px;background:#FFF7E6;padding:2px 6px;border-radius:4px">佣金 ¥44.8</span>
                <span style="color:#999;font-size:11px">已售 892</span>
              </div>
            </div>
          </div>
          
          <!-- 商品卡片5 -->
          <div class="product-card" style="background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06)">
            <div style="position:relative">
              <img src="https://picsum.photos/seed/prod5/200/200" style="width:100%;height:150px;object-fit:cover">
            </div>
            <div style="padding:10px">
              <div style="font-size:13px;color:#333;line-height:1.4;height:36px;overflow:hidden;margin-bottom:8px">无线蓝牙耳机 降噪款</div>
              <div style="display:flex;align-items:center;justify-content:space-between">
                <div>
                  <span style="color:#FF4D4F;font-size:16px;font-weight:600">¥159</span>
                  <span style="color:#999;font-size:11px;text-decoration:line-through;margin-left:4px">¥259</span>
                </div>
              </div>
              <div style="margin-top:6px;display:flex;align-items:center;justify-content:space-between">
                <span style="color:#FF6B00;font-size:11px;background:#FFF7E6;padding:2px 6px;border-radius:4px">佣金 ¥15.9</span>
                <span style="color:#999;font-size:11px">已售 3.2k</span>
              </div>
            </div>
          </div>
          
          <!-- 商品卡片6 -->
          <div class="product-card" style="background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06)">
            <div style="position:relative">
              <img src="https://picsum.photos/seed/prod6/200/200" style="width:100%;height:150px;object-fit:cover">
              <span style="position:absolute;top:8px;left:8px;background:#EB2F96;color:white;font-size:10px;padding:2px 8px;border-radius:10px">限时</span>
            </div>
            <div style="padding:10px">
              <div style="font-size:13px;color:#333;line-height:1.4;height:36px;overflow:hidden;margin-bottom:8px">精美零食大礼包 12件套</div>
              <div style="display:flex;align-items:center;justify-content:space-between">
                <div>
                  <span style="color:#FF4D4F;font-size:16px;font-weight:600">¥68</span>
                  <span style="color:#999;font-size:11px;text-decoration:line-through;margin-left:4px">¥98</span>
                </div>
              </div>
              <div style="margin-top:6px;display:flex;align-items:center;justify-content:space-between">
                <span style="color:#FF6B00;font-size:11px;background:#FFF7E6;padding:2px 6px;border-radius:4px">佣金 ¥6.8</span>
                <span style="color:#999;font-size:11px">已售 8.9k</span>
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <!-- 加载更多 -->
      <div style="text-align:center;padding:16px;color:#999;font-size:13px">
        <i class="fas fa-spinner fa-spin" style="margin-right:6px"></i>加载更多...
      </div>
    </div>
    
    <!-- 底部导航 -->
    <nav class="bottom-nav">
      <div class="nav-item" onclick="location.href='sales-home.html'">
        <i class="fas fa-home"></i>
        <span>首页</span>
      </div>
      <div class="nav-item active" onclick="location.href='sales-product.html'">
        <i class="fas fa-box"></i>
        <span>商品</span>
      </div>
      <div class="nav-item" onclick="location.href='sales-profile.html'">
        <i class="fas fa-user"></i>
        <span>我的</span>
      </div>
    </nav>
  </div>

  <script>
    // 分类标签切换
    document.querySelectorAll('.category-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
      });
    });
  </script>
</body>
</html>
