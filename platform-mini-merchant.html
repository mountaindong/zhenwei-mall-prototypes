<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>臻伟福利系统 - 商家管理</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    .mini-app {
      width: 390px;
      height: 844px;
      background: #f5f7fa;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .status-bar {
      height: 44px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      font-size: 14px;
      font-weight: 500;
    }
    .status-bar .time { font-weight: 600; }
    .status-bar .icons { display: flex; gap: 4px; align-items: center; }
    .header {
      background: linear-gradient(135deg, #1890FF, #40a9ff);
      padding: 16px 20px 24px;
      color: white;
    }
    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .header-title .logo {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .header-title h1 {
      font-size: 18px;
      font-weight: 600;
    }
    .header-subtitle {
      font-size: 12px;
      opacity: 0.85;
      margin-top: 4px;
    }
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 100px;
      margin-top: -8px;
    }
    .search-bar {
      background: white;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .search-bar i {
      color: #999;
      font-size: 14px;
    }
    .search-bar input {
      border: none;
      outline: none;
      font-size: 14px;
      flex: 1;
      background: transparent;
    }
    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: #333;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .merchant-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .merchant-card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .merchant-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .merchant-avatar {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      font-weight: 600;
    }
    .merchant-info {
      flex: 1;
    }
    .merchant-name {
      font-size: 15px;
      font-weight: 600;
      color: #333;
    }
    .merchant-category {
      font-size: 12px;
      color: #999;
      margin-top: 2px;
    }
    .merchant-status {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 12px;
      font-weight: 500;
    }
    .merchant-status.active {
      background: #f6ffed;
      color: #52C41A;
    }
    .merchant-status.pending {
      background: #fffbe6;
      color: #FAAD14;
    }
    .merchant-stats {
      display: flex;
      gap: 16px;
      padding-top: 12px;
      border-top: 1px solid #f0f0f0;
    }
    .merchant-stat {
      text-align: center;
    }
    .merchant-stat-value {
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }
    .merchant-stat-label {
      font-size: 11px;
      color: #999;
      margin-top: 2px;
    }
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 83px;
      background: white;
      border-top: 1px solid #f0f0f0;
      display: flex;
      padding-bottom: 20px;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-item i {
      font-size: 20px;
      color: #999;
    }
    .nav-item span {
      font-size: 10px;
      color: #999;
    }
    .nav-item.active i { color: #1890FF; }
    .nav-item.active span { color: #1890FF; font-weight: 500; }
    .safe-area {
      height: 34px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .home-indicator {
      width: 134px;
      height: 5px;
      background: #333;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="mini-app">
    <div class="status-bar">
      <span class="time">11:08</span>
      <div class="icons">
        <i class="fas fa-signal" style="font-size:12px"></i>
        <i class="fas fa-wifi" style="font-size:12px"></i>
        <i class="fas fa-battery-full" style="font-size:14px"></i>
      </div>
    </div>
    <div class="header">
      <div class="header-title">
        <div class="logo">
          <i class="fas fa-store" style="font-size:18px"></i>
        </div>
        <div>
          <h1>商家管理</h1>
          <div class="header-subtitle">管理平台入驻商家</div>
        </div>
      </div>
    </div>
    <div class="main-content">
      <div class="search-bar">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="搜索商家名称或分类">
      </div>
      <div class="section-title">
        <span><i class="fas fa-store" style="color:#1890FF;margin-right:6px"></i>商家列表</span>
        <span style="font-size:12px;color:#999">共156家</span>
      </div>
      <div class="merchant-list">
        <div class="merchant-card">
          <div class="merchant-header">
            <div class="merchant-avatar">美</div>
            <div class="merchant-info">
              <div class="merchant-name">美味餐厅</div>
              <div class="merchant-category">餐饮美食</div>
            </div>
            <span class="merchant-status active">营业中</span>
          </div>
          <div class="merchant-stats">
            <div class="merchant-stat">
              <div class="merchant-stat-value">¥85.2K</div>
              <div class="merchant-stat-label">本月交易额</div>
            </div>
            <div class="merchant-stat">
              <div class="merchant-stat-value">1,256</div>
              <div class="merchant-stat-label">订单数</div>
            </div>
            <div class="merchant-stat">
              <div class="merchant-stat-value">4.8</div>
              <div class="merchant-stat-label">评分</div>
            </div>
          </div>
        </div>
        <div class="merchant-card">
          <div class="merchant-header">
            <div class="merchant-avatar" style="background:linear-gradient(135deg,#f093fb,#f5576c)">生</div>
            <div class="merchant-info">
              <div class="merchant-name">生鲜超市</div>
              <div class="merchant-category">生鲜果蔬</div>
            </div>
            <span class="merchant-status active">营业中</span>
          </div>
          <div class="merchant-stats">
            <div class="merchant-stat">
              <div class="merchant-stat-value">¥62.8K</div>
              <div class="merchant-stat-label">本月交易额</div>
            </div>
            <div class="merchant-stat">
              <div class="merchant-stat-value">892</div>
              <div class="merchant-stat-label">订单数</div>
            </div>
            <div class="merchant-stat">
              <div class="merchant-stat-value">4.6</div>
              <div class="merchant-stat-label">评分</div>
            </div>
          </div>
        </div>
        <div class="merchant-card">
          <div class="merchant-header">
            <div class="merchant-avatar" style="background:linear-gradient(135deg,#4facfe,#00f2fe)">便</div>
            <div class="merchant-info">
              <div class="merchant-name">便利店小王</div>
              <div class="merchant-category">日用百货</div>
            </div>
            <span class="merchant-status pending">待审核</span>
          </div>
          <div class="merchant-stats">
            <div class="merchant-stat">
              <div class="merchant-stat-value">¥0</div>
              <div class="merchant-stat-label">本月交易额</div>
            </div>
            <div class="merchant-stat">
              <div class="merchant-stat-value">0</div>
              <div class="merchant-stat-label">订单数</div>
            </div>
            <div class="merchant-stat">
              <div class="merchant-stat-value">-</div>
              <div class="merchant-stat-label">评分</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="bottom-nav">
      <div class="nav-item active">
        <i class="fas fa-home"></i>
        <span>首页</span>
      </div>
      <div class="nav-item">
        <i class="fas fa-chart-bar"></i>
        <span>数据</span>
      </div>
      <div class="nav-item">
        <i class="fas fa-clipboard-list"></i>
        <span>待办</span>
      </div>
      <div class="nav-item">
        <i class="fas fa-user"></i>
        <span>我的</span>
      </div>
    </div>
    <div class="safe-area">
      <div class="home-indicator"></div>
    </div>
  </div>
</body>
</html>
