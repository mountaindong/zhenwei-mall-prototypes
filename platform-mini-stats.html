<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>臻伟福利系统 - 数据统计</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    .mini-app {
      width: 390px;
      height: 844px;
      background: #f5f7fa;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .status-bar {
      height: 44px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      font-size: 14px;
      font-weight: 500;
    }
    .status-bar .time { font-weight: 600; }
    .status-bar .icons { display: flex; gap: 4px; align-items: center; }
    .header {
      background: linear-gradient(135deg, #1890FF, #40a9ff);
      padding: 16px 20px 24px;
      color: white;
    }
    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .header-title .logo {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .header-title h1 {
      font-size: 18px;
      font-weight: 600;
    }
    .header-subtitle {
      font-size: 12px;
      opacity: 0.85;
      margin-top: 4px;
    }
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 100px;
      margin-top: -8px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .stat-card.highlight {
      background: linear-gradient(135deg, #1890FF, #40a9ff);
      color: white;
    }
    .stat-card.highlight .stat-label { color: rgba(255,255,255,0.85); }
    .stat-card.highlight .stat-value { color: white; }
    .stat-card.highlight .stat-trend { color: rgba(255,255,255,0.9); }
    .stat-label {
      font-size: 12px;
      color: #999;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #333;
      margin-bottom: 4px;
    }
    .stat-trend {
      font-size: 11px;
      color: #52C41A;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .stat-trend.down { color: #FF4D4F; }
    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: #333;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .chart-section {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      height: 120px;
      padding: 10px 0;
    }
    .bar-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .bar {
      width: 100%;
      background: linear-gradient(to top, #1890FF, #69c0ff);
      border-radius: 4px 4px 0 0;
      transition: all 0.3s;
    }
    .bar:hover {
      background: linear-gradient(to top, #40a9ff, #91d5ff);
    }
    .bar-label {
      font-size: 10px;
      color: #999;
    }
    .bar-value {
      font-size: 9px;
      color: #1890FF;
      font-weight: 500;
    }
    .bottom-nav {
      flex-shrink: 0;
      background: white;
      border-top: 1px solid #f0f0f0;
      display: flex;
      flex-direction: column;
    }
    .nav-items {
      display: flex;
      height: 56px;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-item i {
      font-size: 20px;
      color: #999;
    }
    .nav-item span {
      font-size: 10px;
      color: #999;
    }
    .nav-item.active i { color: #1890FF; }
    .nav-item.active span { color: #1890FF; font-weight: 500; }
    .safe-area {
      height: 34px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .home-indicator {
      width: 134px;
      height: 5px;
      background: #333;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="mini-app">
    <div class="status-bar">
      <span class="time">11:08</span>
      <div class="icons">
        <i class="fas fa-signal" style="font-size:12px"></i>
        <i class="fas fa-wifi" style="font-size:12px"></i>
        <i class="fas fa-battery-full" style="font-size:14px"></i>
      </div>
    </div>
    <div class="header">
      <div class="header-title">
        <div class="logo">
          <i class="fas fa-chart-bar" style="font-size:18px"></i>
        </div>
        <div>
          <h1>数据统计</h1>
          <div class="header-subtitle">平台运营数据分析</div>
        </div>
      </div>
    </div>
    <div class="main-content">
      <div class="stats-grid">
        <div class="stat-card highlight">
          <div class="stat-label">
            <i class="fas fa-chart-line"></i>
            本月交易额
          </div>
          <div class="stat-value">¥3.2M</div>
          <div class="stat-trend">
            <i class="fas fa-arrow-up"></i> 18.5%
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-label">
            <i class="fas fa-shopping-cart"></i>
            本月订单
          </div>
          <div class="stat-value">38,562</div>
          <div class="stat-trend">
            <i class="fas fa-arrow-up"></i> 12.3%
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-label">
            <i class="fas fa-store"></i>
            活跃商家
          </div>
          <div class="stat-value">156</div>
          <div class="stat-trend">
            <i class="fas fa-arrow-up"></i> 5.2%
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-label">
            <i class="fas fa-users"></i>
            累计用户
          </div>
          <div class="stat-value">12,856</div>
          <div class="stat-trend">
            <i class="fas fa-arrow-up"></i> 8.7%
          </div>
        </div>
      </div>
      <div class="section-title">
        <span><i class="fas fa-chart-bar" style="color:#1890FF;margin-right:6px"></i>月度趋势</span>
      </div>
      <div class="chart-section">
        <div class="bar-chart">
          <div class="bar-item">
            <div class="bar-value">2.1万</div>
            <div class="bar" style="height:40%"></div>
            <div class="bar-label">1月</div>
          </div>
          <div class="bar-item">
            <div class="bar-value">2.5万</div>
            <div class="bar" style="height:50%"></div>
            <div class="bar-label">2月</div>
          </div>
          <div class="bar-item">
            <div class="bar-value">3.2万</div>
            <div class="bar" style="height:65%"></div>
            <div class="bar-label">3月</div>
          </div>
          <div class="bar-item">
            <div class="bar-value">2.8万</div>
            <div class="bar" style="height:55%"></div>
            <div class="bar-label">4月</div>
          </div>
          <div class="bar-item">
            <div class="bar-value">3.5万</div>
            <div class="bar" style="height:70%"></div>
            <div class="bar-label">5月</div>
          </div>
          <div class="bar-item">
            <div class="bar-value">4.2万</div>
            <div class="bar" style="height:85%"></div>
            <div class="bar-label">6月</div>
          </div>
        </div>
      </div>
    </div>
    <div class="bottom-nav">
      <div class="nav-items">
        <div class="nav-item">
          <i class="fas fa-home"></i>
          <span>首页</span>
        </div>
        <div class="nav-item active">
          <i class="fas fa-chart-bar"></i>
          <span>数据</span>
        </div>
        <div class="nav-item">
          <i class="fas fa-clipboard-list"></i>
          <span>待办</span>
        </div>
        <div class="nav-item">
          <i class="fas fa-user"></i>
          <span>我的</span>
        </div>
      </div>
      <div class="safe-area">
        <div class="home-indicator"></div>
      </div>
    </div>
  </div>
</body>
</html>
