<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>臻伟福利 - 订单兑换（PC端）</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { 
      height: 100%;
      background: #f0f2f5; 
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; }
    
    /* 整体布局 */
    .app-container {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    
    /* 侧边导航 */
    .sidebar {
      width: 220px;
      background: #001529;
      color: white;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .sidebar-logo i {
      font-size: 24px;
      color: #52C41A;
    }
    
    .sidebar-logo span {
      font-size: 18px;
      font-weight: 600;
    }
    
    .sidebar-menu {
      flex: 1;
      padding: 12px 0;
      overflow-y: auto;
    }
    
    .menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      color: rgba(255,255,255,0.65);
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
    }
    
    .menu-item:hover {
      background: rgba(255,255,255,0.08);
      color: white;
    }
    
    .menu-item.active {
      background: #52C41A;
      color: white;
    }
    
    .menu-item i {
      font-size: 16px;
      width: 20px;
      text-align: center;
    }
    
    .menu-item span {
      font-size: 14px;
    }
    
    /* 主内容区 */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    /* 顶部栏 */
    .topbar {
      height: 60px;
      background: white;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }
    
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .topbar-title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
    }
    
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    
    .notification-btn {
      position: relative;
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      transition: background 0.3s;
    }
    
    .notification-btn:hover {
      background: #f5f5f5;
    }
    
    .notification-btn i {
      font-size: 18px;
      color: #666;
    }
    
    .notification-badge {
      position: absolute;
      top: 2px;
      right: 2px;
      background: #FF4D4F;
      color: white;
      font-size: 10px;
      min-width: 16px;
      height: 16px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }
    
    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 8px;
      transition: background 0.3s;
    }
    
    .user-info:hover {
      background: #f5f5f5;
    }
    
    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #52C41A, #22c55e);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
    }
    
    .user-name {
      font-size: 14px;
      color: #333;
    }
    
    /* 内容区 */
    .content-area {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }
    
    /* 兑换区域 */
    .exchange-section {
      max-width: 800px;
      margin: 0 auto;
    }
    
    .exchange-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      padding: 32px;
    }
    
    .card-title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .card-title i {
      color: #52C41A;
    }
    
    .card-subtitle {
      font-size: 14px;
      color: #999;
      margin-bottom: 24px;
    }
    
    /* 搜索框 */
    .search-box {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }
    
    .search-input-group {
      flex: 1;
      display: flex;
      gap: 12px;
    }
    
    .search-input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s;
    }
    
    .search-input:focus {
      outline: none;
      border-color: #52C41A;
      box-shadow: 0 0 0 2px rgba(82, 196, 26, 0.1);
    }
    
    .search-btn {
      padding: 12px 24px;
      background: #52C41A;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.3s;
    }
    
    .search-btn:hover {
      background: #45a617;
    }
    
    /* 兑换按钮 */
    .exchange-btn {
      padding: 12px 32px;
      background: #FF4D4F;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.3s;
    }
    
    .exchange-btn:hover {
      background: #ff3333;
    }
    
    /* 订单详情 */
    .order-detail {
      background: #fafafa;
      border-radius: 8px;
      padding: 20px;
      margin-top: 20px;
    }
    
    .order-status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #e8e8e8;
    }
    
    .status-badge {
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }
    
    .status-badge.pending {
      background: #fff7e6;
      color: #fa8c16;
    }
    
    .status-badge.exchanged {
      background: #f6ffed;
      color: #52c41a;
    }
    
    .status-badge.not-exchangeable {
      background: #fff1f0;
      color: #ff4d4f;
    }
    
    .status-text {
      font-size: 14px;
      color: #666;
    }
    
    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    
    .info-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .info-label {
      font-size: 12px;
      color: #999;
    }
    
    .info-value {
      font-size: 14px;
      color: #333;
    }
    
    .info-value.highlight {
      color: #FF4D4F;
      font-weight: 600;
    }
    
    .exchange-action {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #e8e8e8;
      display: flex;
      justify-content: center;
    }
    
    .confirm-btn {
      padding: 14px 48px;
      background: #52C41A;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.3s;
    }
    
    .confirm-btn:hover {
      background: #45a617;
    }
    
    /* 弹窗 */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .modal {
      background: white;
      border-radius: 12px;
      width: 400px;
      max-width: 90%;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      overflow: hidden;
    }
    
    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .modal-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }
    
    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      transition: all 0.3s;
    }
    
    .modal-close:hover {
      background: #f5f5f5;
      color: #666;
    }
    
    .modal-body {
      padding: 24px;
    }
    
    .modal-content {
      text-align: center;
    }
    
    .modal-icon {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #f6ffed;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }
    
    .modal-icon i {
      font-size: 28px;
      color: #52C41A;
    }
    
    .modal-message {
      font-size: 15px;
      color: #333;
      margin-bottom: 8px;
    }
    
    .modal-submessage {
      font-size: 13px;
      color: #999;
    }
    
    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      justify-content: center;
      gap: 12px;
    }
    
    .modal-btn {
      padding: 10px 32px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .modal-btn-primary {
      background: #52C41A;
      color: white;
      border: none;
    }
    
    .modal-btn-primary:hover {
      background: #45a617;
    }
    
    .modal-btn-default {
      background: white;
      color: #666;
      border: 1px solid #d9d9d9;
    }
    
    .modal-btn-default:hover {
      border-color: #52C41A;
      color: #52C41A;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- 侧边导航 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <i class="fas fa-store"></i>
          <span>商家工作台</span>
        </div>
      </div>
      <nav class="sidebar-menu">
        <a href="merchant-home.html" class="menu-item">
          <i class="fas fa-home"></i>
          <span>工作台</span>
        </a>
        <a href="merchant-exchange.html" class="menu-item active">
          <i class="fas fa-exchange-alt"></i>
          <span>订单兑换</span>
        </a>
        <a href="merchant-exchange-manage.html" class="menu-item">
          <i class="fas fa-gift"></i>
          <span>兑换管理</span>
        </a>
        <a href="merchant-stats.html" class="menu-item">
          <i class="fas fa-chart-bar"></i>
          <span>数据统计</span>
        </a>
        <a href="merchant-organization.html" class="menu-item">
          <i class="fas fa-sitemap"></i>
          <span>组织架构</span>
        </a>
        <a href="merchant-permission.html" class="menu-item">
          <i class="fas fa-shield-alt"></i>
          <span>权限管理</span>
        </a>
        <a href="merchant-mini-profile.html" class="menu-item">
          <i class="fas fa-user-circle"></i>
          <span>账户设置</span>
        </a>
      </nav>
    </aside>
    
    <!-- 主内容区 -->
    <main class="main-content">
      <!-- 顶部栏 -->
      <header class="topbar">
        <div class="topbar-left">
          <h1 class="topbar-title">订单兑换</h1>
        </div>
        <div class="topbar-right">
          <div class="notification-btn">
            <i class="fas fa-bell"></i>
            <span class="notification-badge">3</span>
          </div>
          <div class="user-info">
            <div class="user-avatar">
              <i class="fas fa-user"></i>
            </div>
            <span class="user-name">张三店铺</span>
          </div>
        </div>
      </header>
      
      <!-- 内容区 -->
      <div class="content-area">
        <div class="exchange-section">
          <div class="exchange-card">
            <div class="card-title">
              <i class="fas fa-qrcode"></i>
              订单兑换
            </div>
            <div class="card-subtitle">输入订单号查询订单信息，确认后进行兑换操作</div>
            
            <!-- 搜索框 -->
            <div class="search-box">
              <div class="search-input-group">
                <input type="text" class="search-input" placeholder="请输入订单号">
                <button class="search-btn">
                  <i class="fas fa-search"></i>
                  查询
                </button>
              </div>
            </div>
            
            <!-- 订单详情 -->
            <div class="order-detail">
              <div class="order-status">
                <span class="status-badge pending">待兑换</span>
                <span class="status-text">该订单可以进行兑换操作</span>
              </div>
              
              <div class="info-grid">
                <div class="info-item">
                  <span class="info-label">订单号</span>
                  <span class="info-value">20260319001</span>
                </div>
                <div class="info-item">
                  <span class="info-label">商品名称</span>
                  <span class="info-value">iPhone手机壳</span>
                </div>
                <div class="info-item">
                  <span class="info-label">商品数量</span>
                  <span class="info-value">1件</span>
                </div>
                <div class="info-item">
                  <span class="info-label">兑换金额</span>
                  <span class="info-value highlight">¥299.00</span>
                </div>
                <div class="info-item">
                  <span class="info-label">购买用户</span>
                  <span class="info-value">张**</span>
                </div>
                <div class="info-item">
                  <span class="info-label">下单时间</span>
                  <span class="info-value">2026-03-19 14:30:00</span>
                </div>
                <div class="info-item">
                  <span class="info-label">收货地址</span>
                  <span class="info-value">北京市朝阳区***街道**号</span>
                </div>
                <div class="info-item">
                  <span class="info-label">联系电话</span>
                  <span class="info-value">138****1234</span>
                </div>
                <div class="info-item" style="grid-column: 1 / -1;">
                  <span class="info-label">兑换卡密</span>
                  <span class="info-value" style="font-family: monospace; background: #fffbe6; padding: 8px 12px; border-radius: 4px; display: inline-block; border: 1px dashed #ffd666;">
                    <i class="fas fa-key" style="color: #fa8c16; margin-right: 6px;"></i>
                    CARD-KEY-2026-0319-ABC123XYZ
                    <button onclick="copyCardKey()" style="margin-left: 8px; padding: 4px 8px; background: #fa8c16; color: white; border: none; border-radius: 4px; font-size: 12px; cursor: pointer;">
                      <i class="fas fa-copy"></i> 复制
                    </button>
                  </span>
                </div>
              </div>
              
              <div class="exchange-action">
                <button class="confirm-btn">
                  <i class="fas fa-check"></i>
                  确认兑换
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  
  <!-- 兑换成功弹窗 -->
  <div class="modal-overlay" style="display: none;">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">兑换成功</span>
        <button class="modal-close">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="modal-content">
          <div class="modal-icon">
            <i class="fas fa-check"></i>
          </div>
          <div class="modal-message">订单兑换成功！</div>
          <div class="modal-submessage">用户将收到兑换通知短信</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn modal-btn-primary">确定</button>
      </div>
    </div>
  </div>
  
  <script>
    // 复制卡密功能
    function copyCardKey() {
      const cardKey = 'CARD-KEY-2026-0319-ABC123XYZ';
      navigator.clipboard.writeText(cardKey).then(() => {
        alert('卡密已复制到剪贴板！');
      }).catch(err => {
        console.error('复制失败:', err);
      });
    }
  </script>
</body>
</html>
